}
.pj-hint { font-weight: 400; color: var(--text3); font-size: 11px; margin-left: 4px; }
.pj-step-context {
  margin-bottom: 14px; padding: 10px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; font-size: 12px; color: var(--text2);
  display: flex; align-items: center; justify-content: space-between;
}
.pj-step-context-toggle {
  background: none; border: none; color: var(--accent); font-size: 12px;
  cursor: pointer; padding: 0; font-weight: 600;
}
.pj-step-prev-preview {
  margin-bottom: 14px; padding: 12px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; font-size: 12px; color: var(--text);
  max-height: 200px; overflow-y: auto; line-height: 1.6;
}
.pj-step-prev-preview.hidden { display: none; }
.pj-btn-next { background: #0d9488; color: #fff; }
.pj-btn-checklist { background: #0369a1; color: #fff; font-size: 11px; padding: 5px 10px; }
.pj-btn-fetch     { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); font-size: 11px; padding: 5px 10px; }
.pj-checklist-actions { display: flex; gap: 6px; margin: 10px 0 18px; flex-wrap: wrap; }
.pj-fetched-notes { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12px; line-height: 1.6; margin-bottom: 12px; }
.pj-model-badge {
  font-size: 10px; font-weight: 700; padding: 1px 7px;
  border-radius: 8px; letter-spacing: 0.3px; vertical-align: middle;
}
.pj-model-opus   { background: #7c3aed; color: #fff; }
.pj-model-sonnet { background: #1d4ed8; color: #fff; }
.pj-model-haiku  { background: #0f766e; color: #fff; }

.pj-step-done-at { font-size: 11px; color: var(--text3); margin-top: 8px; }

/* step 3 Figma 체크포인트 */
.pj-figma-section {
  margin-bottom: 16px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.pj-figma-section:last-child { border-bottom: none; margin-bottom: 0; }
.pj-figma-section-label {
  font-size: 12px; font-weight: 700; color: var(--text2);
  margin-bottom: 10px;
}
.pj-figma-section-manual { margin-top: 4px; }
.pj-figma-input {
  width: 100%; box-sizing: border-box;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px; padding: 9px 12px; outline: none;
  font-family: inherit;
}
.pj-figma-input:focus { border-color: var(--accent); }
.pj-figma-registered {
  margin-top: 8px; font-size: 11px; color: var(--text3);
  word-break: break-all;
}

/* 프로토타입 섹션 */
.pj-proto-section { margin-top: 4px; }
.pj-proto-size-group {
  display: flex; align-items: center; gap: 6px; margin-top: 6px;
}
.pj-proto-size-input {
  width: 72px; padding: 4px 8px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text1); font-size: 13px; text-align: center;
  outline: none;
}
.pj-proto-size-input:focus { border-color: var(--accent); }
.pj-proto-size-sep {
  color: var(--text3); font-size: 14px; font-weight: 500;
}

/* 프로토타입 목록 */
.pj-proto-list-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
}
.pj-proto-item {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 7px 10px; border-radius: 8px;
  background: var(--bg2); border: 1px solid var(--border);
  margin-bottom: 5px;
}
.pj-proto-item-name { font-size: 12px; font-weight: 600; color: var(--text1); flex: 1; min-width: 80px; }
.pj-proto-item-meta { font-size: 10px; color: var(--text3); white-space: nowrap; }
.pj-proto-item-actions { display: flex; gap: 4px; flex-wrap: wrap; }
.pj-proto-btn {
  font-size: 10px; padding: 3px 8px; border-radius: 5px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg3); color: var(--text2);
  text-decoration: none; white-space: nowrap;
}
.pj-proto-btn:hover { border-color: var(--accent); color: var(--accent); }
.pj-proto-btn-del:hover { border-color: var(--error) !important; color: var(--error) !important; }

/* 프로토타입 버전 카드 */
.pj-proto-mgmt-section { margin-top: 4px; }
.pj-ver-card {
  position: relative;
  border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 14px 10px; margin-bottom: 10px;
  background: var(--bg2);
}
.pj-ver-card--done {
  border-color: color-mix(in srgb, var(--success) 35%, transparent);
  background: color-mix(in srgb, var(--success) 4%, var(--bg2));
}
.pj-ver-card--generating {
  border-color: color-mix(in srgb, var(--accent) 50%, transparent);
  animation: pj-gen-pulse 1.6s ease-in-out infinite;
}
@keyframes pj-gen-pulse {
  0%, 100% { border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
  50%       { border-color: var(--accent); }
}
.pj-ver-del-btn {
  position: absolute; top: 8px; right: 10px;
  background: none; border: none; color: var(--text3);
  font-size: 16px; cursor: pointer; line-height: 1; padding: 2px 4px;
}
.pj-ver-del-btn:hover { color: var(--error); }
.pj-ver-field { }
.pj-ver-actions {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.pj-ver-done-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  color: var(--success);
  background: color-mix(in srgb, var(--success) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--success) 30%, transparent);
  border-radius: 20px; padding: 2px 10px;
  margin-bottom: 8px;
}
.pj-ver-done-badge svg { width: 11px; height: 11px; }
.pj-ver-generating-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  border-radius: 20px; padding: 2px 10px;
  margin-bottom: 8px;
}
.pj-gen-spinner {
  display: inline-block; width: 10px; height: 10px;
  border: 2px solid color-mix(in srgb, var(--accent) 30%, transparent);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.pj-ver-readonly-val {
  font-size: 12px; color: var(--text2);
  background: var(--bg3); border-radius: 6px;
  padding: 5px 8px; margin-top: 4px;
  line-height: 1.5;
}
.pj-ver-readonly-desc { white-space: pre-wrap; }
.pj-ver-regen-btn {
  margin-left: auto;
  background: none; border: 1px solid var(--border);
  color: var(--text2); font-size: 11px;
  padding: 3px 10px; border-radius: 6px; cursor: pointer;
}
.pj-ver-regen-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 참고 이미지 업로드 */
.pj-img-upload-area {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start;
  margin-top: 6px;
}
.pj-img-thumbs {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.pj-img-thumb {
  position: relative; width: 72px; height: 72px;
  border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg2);
}
.pj-img-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.pj-img-del {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,.55); color: #fff;
  border: none; border-radius: 50%; width: 16px; height: 16px;
  font-size: 9px; line-height: 16px; text-align: center;
  cursor: pointer; padding: 0;
}
.pj-img-del:hover { background: var(--error); }
.pj-img-add-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 72px; height: 72px; border-radius: 6px;
  border: 1.5px dashed var(--border); color: var(--text3);
  font-size: 11px; cursor: pointer; text-align: center;
  background: var(--bg2); transition: border-color .15s, color .15s;
  line-height: 1.3;
}
.pj-img-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 두 페이즈 섹션 */
.pj-phase-section {
  margin-bottom: 16px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.pj-phase-section:last-child { border-bottom: none; margin-bottom: 0; }
.pj-phase-label {
  font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 10px;
}
.pj-phase-publish { margin-top: 4px; }
.pj-phase-hint { font-size: 12px; color: var(--text3); margin-bottom: 8px; }

/* 첨부파일 선택기 */
.pj-attach-picker { margin-bottom: 14px; }
.pj-attach-picker-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .04em;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.pj-attach-list { display: flex; flex-direction: column; gap: 5px; }
.pj-attach-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px; cursor: pointer;
  transition: border-color .15s;
}
.pj-attach-item:hover { border-color: var(--accent); }
.pj-attach-item input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
.pj-attach-item-name { font-size: 12px; color: var(--text1); flex: 1; word-break: break-all; }
.pj-attach-item-meta { font-size: 11px; color: var(--text3); white-space: nowrap; }
.pj-attach-empty { font-size: 12px; color: var(--text3); padding: 6px 0; }
.pj-attach-priority { font-size: 11px; color: #b45309; background: #fefce8; border: 1px solid #fde68a;
  border-radius: 4px; padding: 4px 8px; margin-bottom: 8px; line-height: 1.4; }

/* 첨부파일 선택 모달 */
.attach-modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 3000;
  display: flex; align-items: center; justify-content: center;
}
.attach-modal {
  background: #1e2130; border: 2px solid var(--accent); border-radius: 10px;
  padding: 20px; min-width: 360px; max-width: 500px; width: 90%;
  max-height: 70vh; display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
}
.attach-modal-title { font-size: 14px; font-weight: 600; color: var(--text1); }
.attach-modal-body { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.attach-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.attach-modal-actions .pj-btn { padding: 6px 14px; font-size: 12px; }
.pj-published-badge {
  font-size: 12px; color: #16a34a; margin-bottom: 8px;
  word-break: break-all;
}
.pj-btn-publish     { background: #0369a1; color: #fff; }
.pj-btn-figma-desc  { background: #7c3aed; color: #fff; }

/* 콘솔 영역 */
.pj-console-wrap {
  height: 220px; flex-shrink: 0; display: flex; flex-direction: column;
  border-top: 1px solid var(--border); background: #0d0d0d;
}
.pj-console-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px; font-size: 11px; color: var(--text3);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.pj-console-header .lucide { width: 13px; height: 13px; }
.pj-console-clear-btn {
  background: none; border: none; color: var(--text3); font-size: 11px;
  cursor: pointer; padding: 2px 6px; border-radius: 4px;
}
.pj-console-clear-btn:hover { color: var(--text); background: var(--bg2); }
.pj-console-abort-btn {
  background: #ef4444; border: none; color: #fff; font-size: 11px; font-weight: 600;
  cursor: pointer; padding: 3px 10px; border-radius: 4px;
}
.pj-console-abort-btn:hover { background: #dc2626; }
.pj-console-abort-btn.hidden { display: none; }
.pj-console {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6;
}
.pj-console-line { color: #d4d4d4; white-space: pre-wrap; word-break: break-all; }
.pj-console-line.info    { color: #60a5fa; }
.pj-console-line.success { color: #4ade80; }
.pj-console-line.error   { color: #f87171; }
.pj-console-line.tool    { color: #c084fc; }

/* 에이전트 응답 입력 영역 */
.pj-console-reply {
  display: flex; gap: 6px; padding: 8px 10px;
  border-top: 1px solid var(--border); background: #15161a; flex-shrink: 0;
}
.pj-console-reply.hidden { display: none; }
.pj-console-reply textarea {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text2); font-size: 12px; padding: 6px 10px; outline: none;
  font-family: inherit; resize: none; min-height: 30px; max-height: 100px;
}
.pj-console-reply textarea:focus { border-color: var(--accent); }
.pj-console-reply textarea:disabled { opacity: 0.5; cursor: not-allowed; }
.pj-console-reply button { font-size: 11px; padding: 6px 12px; flex-shrink: 0; }
.pj-console-reply-hint {
  font-size: 11px; color: var(--text3); padding: 4px 12px; flex-shrink: 0;
  background: #15161a; border-top: 1px solid var(--border);
}
.pj-console-reply-hint.hidden { display: none; }
.pj-console-line.warn    { color: #fbbf24; }

/* ── 워크플로우 뷰 ──────────────────────────────────────────── */
.workflow-view {
  flex: 1;
  display: flex;
  min-height: 0;
  background: var(--bg);
}
.wf-sidebar {
  width: 240px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg2);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.wf-sidebar-section {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.wf-sidebar-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.4px;
  margin-bottom: 8px;
}
.wf-sidebar-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.wf-empty {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  padding: 4px 2px;
}
.wf-add-btn {
  margin-top: 8px;
  width: 100%;
  padding: 5px 8px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text2);
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}
.wf-add-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
}
.wf-add-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.wf-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.wf-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.wf-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.wf-spacer { flex: 1; }
.wf-tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}
.wf-tool-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
}
.wf-tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.wf-tool-btn i { width: 13px; height: 13px; }

.wf-canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#wfCanvas {
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0 / 20px 20px,
    var(--bg);
}
/* Drawflow 기본 색상을 다크 테마에 맞춤 */
#wfCanvas .drawflow .drawflow-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
#wfCanvas .drawflow .drawflow-node.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent);
}
#wfCanvas .drawflow .connection .main-path {
  stroke: var(--text2);
  stroke-width: 2;
}
#wfCanvas .drawflow .connection .main-path:hover {
  stroke: var(--accent);
}

/* ── 워크플로우 사이드바 카드 ──────────────────────────────── */
.wf-card {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11px;
  color: var(--text);
  cursor: grab;
  user-select: none;
  transition: border-color 0.1s, background 0.1s;
  overflow: hidden;
}
.wf-card:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 8%, var(--bg));
}
.wf-card:active {
  cursor: grabbing;
}
.wf-card-icon {
  font-size: 13px;
  flex-shrink: 0;
}
.wf-card-label {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wf-card-outs {
  font-size: 9px;
  color: var(--text3);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── 워크플로우 노드 카드 (Drawflow 내부) ────────────────── */
/* Drawflow 기본 display:flex; align-items:center 는 유지(입력/출력 포트 위치 정상화).
   padding/width 만 우리 값으로 덮어쓰고, 실제 컨텐츠 padding은 .drawflow_content_node 에서 처리. */
.drawflow .drawflow-node.wf-node-skill,
.drawflow .drawflow-node.wf-node-ctrl {
  padding: 0;
  width: auto;
  min-height: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
}
.drawflow .drawflow-node.wf-node-skill {
  min-width: 220px;
  border-radius: 8px;
}
.drawflow .drawflow-node.wf-node-ctrl {
  min-width: 90px;
  border-radius: 50px;
}
.drawflow .drawflow-node.wf-node-skill .drawflow_content_node,
.drawflow .drawflow-node.wf-node-ctrl  .drawflow_content_node {
  flex: 1;
}
.drawflow .drawflow-node.wf-node-skill .drawflow_content_node { padding: 10px 14px; }
.drawflow .drawflow-node.wf-node-ctrl  .drawflow_content_node { padding: 6px 14px; }
.wf-node-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0;
}
.wf-node-ctrl-card {
  flex-direction: row !important;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* input/output 포트 — 다크 테마에 어울리게 + 시작=초록 / 끝=주황 톤 */
.drawflow .drawflow-node .input,
.drawflow .drawflow-node .output {
  background: var(--bg2);
  border: 2px solid var(--text2);
  width: 14px;
  height: 14px;
}
.drawflow .drawflow-node .input  { border-color: #fbbf24; }
.drawflow .drawflow-node .output { border-color: #4ade80; }
.drawflow .drawflow-node .input:hover,
.drawflow .drawflow-node .output:hover {
  background: var(--accent);
}
.wf-node-head {
  display: flex;
  align-items: center;
  gap: 6px;
}
.wf-node-icon {
  font-size: 14px;
  flex-shrink: 0;
}
.wf-node-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.wf-node-skillid {
  font-size: 9px;
  color: var(--text3);
  font-family: monospace;
  margin-top: -2px;
}
.wf-node-materials {
  margin-top: 4px;
  padding: 4px;
  min-height: 22px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  font-size: 10px;
  color: var(--text3);
}
.wf-node-materials:empty::before,
.wf-node-materials[data-empty]::before {
  content: attr(data-empty);
  color: var(--text3);
  font-style: italic;
}
.wf-node-materials:not(:empty)::before { content: none; }

/* ── 워크플로우 사이드바 — lucide 아이콘 ──────────────────── */
.wf-sidebar-title {
  display: flex;
  align-items: center;
  gap: 6px;
}
.wf-sidebar-title i {
  width: 14px;
  height: 14px;
  stroke-width: 2;
}
.wf-card i {
  width: 14px;
  height: 14px;
  stroke-width: 2;
  flex-shrink: 0;
}
/* 옛 .wf-card-icon 스타일 제거 — 이모지 사용 안 함 */

/* ── 재료 슬롯 (스킬 노드 안) ─────────────────────────────── */
.wf-mat-slot {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 6px;
  margin: 2px 3px 2px 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 10px;
  color: var(--text);
}
.wf-mat-slot i {
  width: 11px;
  height: 11px;
  stroke-width: 2.2;
}
.wf-mat-label { color: var(--text2); }
.wf-mat-value {
  font-weight: 600;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.wf-mat-del,
.wf-mat-edit {
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  line-height: 1;
  padding: 0 2px;
}
.wf-mat-del:hover { color: var(--error); }
.wf-mat-edit:hover { color: var(--accent); }

/* 노드 head 아이콘 — i 태그와 lucide가 치환한 svg 모두 크기 강제 */
.wf-node-head > i,
.wf-node-head > svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  display: inline-block;
  stroke-width: 2;
  vertical-align: middle;
}
.wf-node-ctrl-card > i,
.wf-node-ctrl-card > svg {
  width: 13px;
  height: 13px;
  flex-shrink: 0;
  display: inline-block;
  stroke-width: 2;
  vertical-align: middle;
}
.wf-node-head { line-height: 1.4; }

/* ── 워크플로우 툴바 — select / 힌트 ─────────────────────── */
.wf-select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  padding: 5px 8px;
  border-radius: 6px;
  min-width: 180px;
  max-width: 260px;
  cursor: pointer;
}
.wf-select:focus {
  outline: none;
  border-color: var(--accent);
}
.wf-saved-hint {
  font-size: 11px;
  color: var(--text2);
  margin-right: 6px;
}

/* ── 워크플로우 아이콘 래퍼 (i를 svg로 치환할 때 색상 전달용) ── */
.wf-ico {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  flex-shrink: 0;
}
.wf-ico svg {
  color: inherit;        /* 부모 .wf-ico의 색상 상속 (svg currentColor) */
  stroke: currentColor;
}
/* 사용처별 크기 */
.wf-card .wf-ico,
.wf-card .wf-ico svg { width: 14px; height: 14px; }
.wf-sidebar-title .wf-ico,
.wf-sidebar-title .wf-ico svg { width: 14px; height: 14px; }
.wf-node-head .wf-ico,
.wf-node-head .wf-ico svg { width: 15px; height: 15px; }
.wf-node-ctrl-card .wf-ico,
.wf-node-ctrl-card .wf-ico svg { width: 13px; height: 13px; }
.wf-mat-slot .wf-ico,
.wf-mat-slot .wf-ico svg { width: 11px; height: 11px; }

/* 동적 스킬 팔레트 — 그룹 구분 헤더 + 이모지 아이콘 */
.wf-skill-group {
  font-size: 10px;
  color: var(--text3);
  padding: 8px 4px 2px;
  font-weight: 600;
}
.wf-skill-group:first-child { padding-top: 2px; }
.wf-ico-emoji { font-size: 13px; line-height: 1; flex-shrink: 0; }

/* ── 워크플로우 노드 상태 시각화 ──────────────────────────── */
.drawflow .drawflow-node.wf-status-running {
  border-color: #fbbf24 !important;
  box-shadow: 0 0 0 2px color-mix(in srgb, #fbbf24 30%, transparent);
  animation: wf-pulse 1s ease-in-out infinite alternate;
}
.drawflow .drawflow-node.wf-status-done {
  border-color: #4ade80 !important;
  background: color-mix(in srgb, #4ade80 5%, var(--bg2)) !important;
}
.drawflow .drawflow-node.wf-status-failed {
  border-color: #f87171 !important;
  background: color-mix(in srgb, #f87171 8%, var(--bg2)) !important;
}
/* 확인 질문 답변 대기 — 보라색 점멸 */
.drawflow .drawflow-node.wf-status-waiting {
  border-color: #a78bfa !important;
  box-shadow: 0 0 0 2px color-mix(in srgb, #a78bfa 35%, transparent);
  animation: wf-pulse-wait 1s ease-in-out infinite alternate;
}
@keyframes wf-pulse-wait {
  from { box-shadow: 0 0 0 2px color-mix(in srgb, #a78bfa 35%, transparent); }
  to   { box-shadow: 0 0 0 4px color-mix(in srgb, #a78bfa 60%, transparent); }
}
@keyframes wf-pulse {
  from { box-shadow: 0 0 0 2px color-mix(in srgb, #fbbf24 30%, transparent); }
  to   { box-shadow: 0 0 0 4px color-mix(in srgb, #fbbf24 55%, transparent); }
}

/* ── 워크플로우 사이드바 카드 툴팁 ───────────────────────── */
.wf-tooltip {
  position: fixed;
  z-index: 9999;
  max-width: 320px;
  padding: 6px 9px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--text);
  box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  pointer-events: none;
  white-space: normal;
  word-break: break-word;
  opacity: 0;
  transition: opacity 0.08s ease;
}
.wf-tooltip.show { opacity: 1; }

/* ── 워크플로우 실행 콘솔 ─────────────────────────────────── */
.wf-console {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  height: 240px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.wf-console.hidden { display: none; }
.wf-console-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.wf-console-title { font-weight: 600; color: var(--text); }
.wf-console-node { color: var(--text2); font-size: 11px; }
.wf-console-spinner {
  width: 12px;
  height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.wf-console-spinner.hidden { display: none; }
.wf-console-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  line-height: 1.5;
}
.wf-console-line { padding: 1px 0; white-space: pre-wrap; word-break: break-word; }
.wf-console-line.info  { color: var(--text2); }
.wf-console-line.step  { color: var(--accent); font-weight: 600; margin-top: 6px; }
.wf-console-line.cmd   { color: #a78bfa; }
.wf-console-line.tool  { color: #60a5fa; }
.wf-console-line.text  { color: var(--text); }
.wf-console-line.error { color: var(--error); }

/* ── 콘솔 작업 탭 (병렬 실행) ── */
.console-tabs { display:flex; gap:4px; overflow-x:auto; padding:6px 8px 0; border-bottom:1px solid var(--border); }
.console-tabs:empty { display:none; }
/* 비활성 탭: 가라앉은 배경이되 텍스트는 또렷이 읽힌다 (opacity로 죽이지 않음) */
.console-tab { display:flex; align-items:center; gap:6px; padding:6px 12px;
  border:1px solid var(--border); border-bottom:none; border-top:3px solid transparent;
  border-radius:8px 8px 0 0; background:var(--bg2); font-size:12px; white-space:nowrap; cursor:pointer;
  color:var(--text2); opacity:1; transition:background .15s, color .15s, border-color .15s; }
.console-tab:hover { background:var(--bg3); color:var(--text); }
/* 활성 탭: 굵은 상단 accent 라인 + accent 테두리 + 보라 틴트 배경 + 굵은 흰 글씨 — 확실히 도드라지게 */
.console-tab.active { background:color-mix(in srgb, var(--accent) 14%, var(--bg3)); color:var(--text); font-weight:700;
  border-color:var(--accent); border-top:3px solid var(--accent);
  box-shadow:0 -2px 8px rgba(108,99,255,0.30); }
.console-tab .tab-badge { font-size:11px; }
.console-tab .tab-close { opacity:.45; margin-left:2px; font-size:11px; }
.console-tab .tab-close:hover { opacity:1; }
.console-tab.st-running .tab-badge { color:#3b82f6; }
.console-tab.st-done    .tab-badge { color:#16a34a; }
.console-tab.st-error   .tab-badge { color:#dc2626; }
.console-tab.st-aborted .tab-badge { color:#dc2626; }
.console-tab.st-waiting .tab-badge { color:#a855f7; }
.console-tab.st-queued  .tab-badge { color:#9ca3af; }

/* ── QA 검증 뷰 ── */
.qa-view { display:flex; flex-direction:column; height:100%; overflow:hidden; padding:0; }
.qa-header { display:flex; align-items:center; gap:12px; padding:16px 20px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.qa-view-title { font-size:16px; font-weight:700; color:var(--text); }
.qa-summary-badge { font-size:12px; color:var(--text2); background:var(--bg3); padding:3px 10px; border-radius:12px; }
.qa-card-list { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:10px; }

/* QA 카드 */
.qa-card { border:1px solid var(--border); border-radius:10px; background:var(--bg); overflow:hidden; }
.qa-card-header { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--bg3); border-bottom:1px solid var(--border); flex-wrap:wrap; }
.qa-card-title { font-size:13px; font-weight:600; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.qa-card-status { font-size:12px; color:var(--text2); white-space:nowrap; }
.qa-btn-toggle, .qa-btn-jira { font-size:12px; padding:3px 10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); cursor:pointer; color:var(--text2); }
.qa-btn-jira { background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
.qa-btn-jira:disabled { opacity:.5; cursor:default; }
.qa-btn-jira.hidden { display:none; }

/* QA TC 테이블 */
.qa-card-body { padding:10px 14px; overflow-x:auto; }
.qa-card-body.hidden { display:none; }
.qa-tc-table { width:100%; border-collapse:collapse; font-size:12px; }
.qa-tc-table th { text-align:left; padding:5px 8px; background:var(--bg3); color:var(--text2); font-weight:600; border-bottom:1px solid var(--border); white-space:nowrap; }
.qa-tc-table td { padding:5px 8px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:top; }
.qa-tc-table tr:last-child td { border-bottom:none; }
.qa-result-cell { font-weight:700; text-align:center; white-space:nowrap; }
.qa-detail-cell { color:var(--text2); font-size:11px; max-width:200px; }

/* TC 행 상태 */
.qa-pass { background:#f0fdf4; }
.qa-fail { background:#fff1f2; }
.qa-running { background:#fefce8; }

/* QA 시작 버튼 */
.btn-task-qa-run { background:var(--bg3); color:var(--text); border-color:var(--border); }
.btn-task-qa-run:hover { background:var(--bg2); border-color:var(--accent); }

/* ── 퍼블 검수 뷰 ── */
.review-view { display:flex; height:100%; overflow:hidden; }
.rv-left { width:180px; flex:0 0 auto; border-right:1px solid var(--border); display:flex; flex-direction:column; }
.rv-left-head { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; font-weight:600; }
.rv-mini-btn { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:11px; cursor:pointer; color:var(--text2); }
.rv-mini-btn:hover { border-color:var(--accent); }
.rv-set-list { border-bottom:1px solid var(--border); max-height:32%; overflow:auto; }
.rv-set-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; font-size:12px; cursor:pointer; border-bottom:1px solid var(--border); color:var(--text2); }
.rv-set-item:hover { background:var(--bg3); }
.rv-set-item.active { background:var(--bg2); color:var(--text); font-weight:600; }
.rv-set-del { opacity:.4; font-size:11px; }
.rv-set-del:hover { opacity:1; color:var(--error); }
.rv-tree { flex:1; overflow:auto; padding:6px 0; }
.rv-group-name { font-size:11px; color:var(--text3); padding:8px 12px 4px; }
.rv-screen { padding:6px 12px 6px 20px; font-size:12px; cursor:pointer; color:var(--text2); border-left:2px solid transparent; }
.rv-screen:hover { background:var(--bg3); }
.rv-screen.active { background:var(--bg2); color:var(--text); font-weight:600; border-left-color:var(--accent); }
.rv-stage { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg2); }
.rv-stage-bar { padding:8px 12px; border-bottom:1px solid var(--border); font-size:12px; display:flex; gap:8px; align-items:center; color:var(--text); }
.rv-frame-wrap { flex:1; overflow:auto; text-align:center; }
.rv-frame { position:relative; display:inline-block; background:#fff; box-shadow:0 0 0 1px var(--border); vertical-align:top; }
.rv-iframe { width:100%; height:100%; border:0; background:#fff; display:block; }
.rv-overlay { position:absolute; inset:0; cursor:crosshair; }
.rv-pin { position:absolute; transform:translate(-50%,-50%); width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.4); cursor:pointer; z-index:2; }
.rv-pin.ai { background:#a855f7; }
.rv-pin.done { background:#16a34a; opacity:.7; }
.rv-openraw { margin-left:auto; font-size:11px; color:var(--accent2); text-decoration:none; }
.rv-comments { width:300px; flex:0 0 auto; border-left:1px solid var(--border); overflow:auto; }
.rv-cmt { border-bottom:1px solid var(--border); padding:10px 12px; }
.rv-cmt.resolved { opacity:.55; }
.rv-cmt-head { display:flex; align-items:center; gap:6px; font-size:11px; }
.rv-cmt-no { background:var(--accent); color:#fff; border-radius:50%; width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }
.rv-cmt-author { font-weight:600; color:var(--text); }
.rv-cmt-resolve, .rv-cmt-del { background:none; border:none; cursor:pointer; color:var(--text3); font-size:12px; }
.rv-cmt-resolve { margin-left:auto; }
.rv-cmt-del:hover { color:var(--error); }
.rv-cmt-text { font-size:12px; margin:6px 0; white-space:pre-wrap; color:var(--text); }
.rv-reply { font-size:11px; color:var(--text2); padding:3px 0; }
.rv-reply-row { display:flex; gap:4px; margin-top:4px; }
.rv-reply-in { flex:1; font-size:11px; border:1px solid var(--border); border-radius:6px; background:var(--bg3); padding:3px 6px; color:var(--text); }
.rv-reply-send { border:1px solid var(--border); background:var(--bg3); border-radius:6px; cursor:pointer; padding:0 8px; color:var(--text2); }
.review-view .rv-empty { padding:12px; color:var(--text3); font-size:12px; }
.rv-ai-btn { background:#a855f7; color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; }
.rv-ai-btn:hover { background:#9333ea; }
.rv-ai-btn:disabled { opacity:.6; cursor:default; }
.rv-share-btn { background:#2f6d5e; color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; }
.rv-share-btn:hover { background:#255a4d; }
.rv-copyurl-btn { margin-left:auto; background:var(--bg3); color:var(--text2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; }
.rv-copyurl-btn:hover { border-color:var(--accent); color:var(--text); }
.rv-stage-bar .rv-openraw { margin-left:8px; }
/* 핀 클릭 입력 팝업 */
.rv-pin-input { position:absolute; transform:translate(-50%,-50%); z-index:5; }
.rv-pin-new { position:absolute; left:0; top:0; transform:translate(-50%,-50%); }
.rv-pin-box { position:absolute; left:16px; top:-8px; width:230px; background:var(--bg); border:1px solid var(--accent); border-radius:10px; padding:8px; box-shadow:0 4px 16px rgba(0,0,0,.35); }
.rv-pin-input.left .rv-pin-box { left:auto; right:16px; }
.rv-pin-input.up .rv-pin-box { top:auto; bottom:-8px; }
.rv-pin-ta { width:100%; box-sizing:border-box; height:60px; resize:none; border:1px solid var(--border); border-radius:6px; background:var(--bg3); color:var(--text); font-size:12px; padding:6px; }
.rv-pin-btns { display:flex; justify-content:flex-end; gap:6px; margin-top:6px; }
.rv-pin-btns button { border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer; }
.rv-pin-cancel { background:var(--bg3); color:var(--text2); }
.rv-pin-save { background:var(--accent); color:#fff; border-color:var(--accent); }
.rv-stage-bar .rv-bar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.rv-pin-draggable { cursor:grab; }
.rv-pin-draggable.dragging { cursor:grabbing; box-shadow:0 2px 10px rgba(0,0,0,.5); }
.rv-pin-numrow { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text2); margin-bottom:6px; }
.rv-pin-num-in { width:50px; border:1px solid var(--border); border-radius:6px; background:var(--bg3); color:var(--text); padding:3px 6px; font-size:12px; }
.rv-pin-numhint { color:var(--text3); font-size:10px; }
.rv-overlay.rv-adding-pin { cursor:copy; }
.rv-cmt-addpin { background:none; border:none; cursor:pointer; color:var(--accent2); font-size:12px; }
.rv-cmt-pincnt { color:var(--text3); font-weight:400; font-size:10px; }
.rv-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#111; color:#fff; padding:10px 16px; border-radius:10px; font-size:13px; z-index:99999; opacity:0; transition:opacity .2s; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.4); }
.rv-toast.show { opacity:1; }
/* 코멘트 인라인 수정 */
.rv-edit-ta { width:100%; box-sizing:border-box; height:56px; resize:vertical; border:1px solid var(--accent); border-radius:6px; background:var(--bg3); color:var(--text); font-size:12px; padding:6px; }
.rv-edit-btns { display:flex; justify-content:flex-end; gap:6px; margin-top:4px; }
.rv-edit-btns button { border:1px solid var(--border); border-radius:6px; padding:3px 10px; font-size:11px; cursor:pointer; }
.rv-edit-cancel { background:var(--bg3); color:var(--text2); }
.rv-edit-save { background:var(--accent); color:#fff; border-color:var(--accent); }
.rv-cmt-edit { background:none; border:none; cursor:pointer; font-size:12px; }
/* 보기(공유) 모드 — 스크롤 잠금 */
.rv-readonly, .rv-readonly body { overflow:hidden; }
/* 코멘트 이미지 (붙여넣기) */
.rv-img-strip { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.rv-img-thumb { position:relative; display:inline-block; }
.rv-img-thumb img { height:48px; border-radius:6px; border:1px solid var(--border); display:block; }
.rv-img-x { position:absolute; top:-6px; right:-6px; background:#dc2626; color:#fff; border:none; border-radius:50%; width:16px; height:16px; font-size:10px; cursor:pointer; line-height:1; }
.rv-cmt-imgs { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.rv-cmt-img { max-width:100%; max-height:160px; border-radius:6px; border:1px solid var(--border); cursor:zoom-in; }
.rv-screen-cnt { color:var(--accent2); font-size:11px; }
.rv-fw-ctl { font-size:11px; color:var(--text2); }

// ── 세트 목록 ──
async function rvLoadSets() {
  const el = document.getElementById('rvSetList');
  try {
    const { sets } = await fetch('/api/reviews').then(r => r.json());
    el.innerHTML = sets.length
      ? sets.map(s => `<div class="rv-set-item ${_rvSet && _rvSet.id === s.id ? 'active' : ''}" data-id="${s.id}">
          <span>${rvEsc(s.name)}</span><span class="rv-set-del" data-del="${s.id}">✕</span></div>`).join('')
      : '<div class="rv-empty">세트 없음 — "새 세트"로 추가</div>';
    el.querySelectorAll('.rv-set-item').forEach(it => it.addEventListener('click', (e) => {
      if (e.target.dataset.del) { rvDeleteSet(e.target.dataset.del); return; }
      rvOpenSet(it.dataset.id);
    }));
  } catch { el.innerHTML = '<div class="rv-empty">목록 로드 실패</div>'; }
}

async function rvDeleteSet(id) {
  if (!confirm('이 검수 세트를 삭제할까요?')) return;
  await fetch(`/api/reviews/${id}`, { method: 'DELETE' });
  if (_rvSet && _rvSet.id === id) { _rvSet = null; document.getElementById('rvTree').innerHTML = '';
    document.getElementById('rvFrameWrap').innerHTML = ''; document.getElementById('rvStageBar').innerHTML = '';
    document.getElementById('rvComments').innerHTML = ''; }
  rvLoadSets();
}

      <div style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--text);">📋 새 검수 세트</div>
      <input id="rvNewName" placeholder="세트 이름 (예: 캐츠 활용기 퍼블 검수)"
        style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);margin-bottom:10px;">
      <textarea id="rvNewLinks" rows="12" placeholder="링크 목록 붙여넣기&#10;그룹명 줄 + '라벨 : URL' 줄&#10;예)&#10;공지 1개 : https://...post_01.html&#10;내 게시글&#10;페이징 있을때 : https://...my_post_01.html"
        style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-family:monospace;font-size:12px;resize:vertical;"></textarea>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
        <button id="rvNewCancel" style="background:var(--bg3);border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;color:var(--text2);">취소</button>
        <button id="rvNewCreate" style="background:var(--accent);border:none;padding:8px 18px;border-radius:8px;cursor:pointer;color:#fff;font-weight:600;">만들기</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  const close = () => m.remove();
  m.addEventListener('click', e => { if (e.target === m) close(); });
  m.querySelector('#rvNewCancel').addEventListener('click', close);
  m.querySelector('#rvNewCreate').addEventListener('click', async () => {
    const name = m.querySelector('#rvNewName').value.trim();

    if (!raw) { m.querySelector('#rvNewLinks').focus(); return; }
    const s = await fetch('/api/reviews', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name || '검수 세트', raw_links: raw }),
    }).then(r => r.json());
    close(); await rvLoadSets(); rvRenderSet(s);
  });
  setTimeout(() => m.querySelector('#rvNewName').focus(), 50);
}

// ── 세트 열기 / 트리 ──
async function rvOpenSet(id) {
  const s = await fetch(`/api/reviews/${id}`).then(r => r.json());
  rvRenderSet(s);
  rvLoadSets();
}

function rvRenderSet(s) {
  _rvSet = s;
  const tree = document.getElementById('rvTree');
  tree.innerHTML = s.groups.map(g => `
    <div class="rv-group"><div class="rv-group-name">${rvEsc(g.name)}</div>
      ${g.screens.map(sc => `<div class="rv-screen" data-sid="${sc.id}">${rvEsc(sc.label)} <span class="rv-screen-cnt" data-cntfor="${sc.id}"></span></div>`).join('')}
    </div>`).join('');
  tree.querySelectorAll('.rv-screen').forEach(el => el.addEventListener('click', () => rvShowScreen(el.dataset.sid)));
  rvUpdateTreeCounts();
  const first = s.groups[0] && s.groups[0].screens[0];
  if (first) rvShowScreen(first.id);
}

// 왼쪽 화면 목록에 코멘트 개수 (N) 표기 갱신
function rvUpdateTreeCounts() {
  document.querySelectorAll('.rv-screen-cnt[data-cntfor]').forEach(el => {
    const n = rvScreenComments(el.dataset.cntfor).length;
    el.textContent = n ? `(${n})` : '';
  });
}

function rvFindScreen(sid) {
  for (const g of _rvSet.groups) for (const sc of g.screens) if (sc.id === sid) return sc;
  return null;
}

function rvScreenComments(sid) { return (_rvSet.comments && _rvSet.comments[sid]) || []; }

// 이미지 확대 라이트박스
function rvLightbox(src) {
  const old = document.getElementById('rvLightbox'); if (old) old.remove();
  const d = document.createElement('div');
  d.id = 'rvLightbox';
  d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  d.innerHTML = `<img src="${src}" style="max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6);">`;
  d.addEventListener('click', () => d.remove());
  document.body.appendChild(d);
}

// 붙여넣기(클립보드) 이미지 → data URI 콜백
// 텍스트가 함께 있으면(텍스트 복사) 이미지로 처리하지 않고 기본 텍스트 붙여넣기 허용
function rvHandlePasteImages(e, onImage) {
  const cd = e.clipboardData;
  if (!cd) return;
  const hasText = !!(cd.getData && (cd.getData('text/plain') || cd.getData('text/html')));
  if (hasText) return;   // 텍스트 복사 → 그대로 텍스트로 붙여넣기
  const items = cd.items || [];
  let handled = false;
  for (const it of items) {
    if (it.type && it.type.indexOf('image/') === 0) {
      const file = it.getAsFile();
      if (!file) continue;
      const reader = new FileReader();
      reader.onload = () => onImage(reader.result);
      reader.readAsDataURL(file);
      handled = true;
    }
  }
  if (handled) e.preventDefault();
}

// 핀 드래그로 위치 이동 → 해당 코멘트의 pins[pi] 갱신 후 저장(PUT)
function rvMakePinDraggable(pin, ov, c, pi) {
  pin.classList.add('rv-pin-draggable');
  pin.addEventListener('mousedown', (e) => {
    e.preventDefault(); e.stopPropagation();
    pin.classList.add('dragging');
    let moved = false, nx = 0, ny = 0;
    const move = (ev) => {
      moved = true;
      const r = ov.getBoundingClientRect();
      nx = Math.max(0, Math.min(100, ((ev.clientX - r.left) / r.width) * 100));
      ny = Math.max(0, Math.min(100, ((ev.clientY - r.top) / r.height) * 100));
      pin.style.left = nx + '%'; pin.style.top = ny + '%';
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      pin.classList.remove('dragging');
      if (moved) {
        c.pins = (c.pins && c.pins.length) ? c.pins : [{ x: c.x, y: c.y }];
        c.pins[pi] = { x: nx, y: ny };
        if (pi === 0) { c.x = nx; c.y = ny; }
        fetch(`/api/reviews/${_rvSet.id}/comments/${c.id}/pins`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pins: c.pins }),
        }).catch(() => {});
      }
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// 스테이지 바 렌더 — 공유 전: '올리기' / 공유 후: '동기화' + URL 복사 버튼
function rvRenderStageBar(sc) {
  const bar = document.getElementById('rvStageBar');
  if (!bar) return;
  if (RV_RO) {
    bar.innerHTML = `<b>${rvEsc(sc.label)}</b><span class="rv-bar-right"><a href="${sc.url}" target="_blank" class="rv-openraw">↗ 원본 열기</a></span>`;
    return;
  }
  const shared = !!(_rvSet && _rvSet.shared);
  const fw = rvScreenWidth(sc.id);
  const fh = rvScreenHeight(sc.id);
  bar.innerHTML = `<b>${rvEsc(sc.label)}</b>
    <span class="rv-fw-ctl">폭 <select class="rv-fw-sel" id="rvFwSel">
      <option value="360"${fw===360?' selected':''}>360</option>
      <option value="390"${fw===390?' selected':''}>390(모바일)</option>
      <option value="768"${fw===768?' selected':''}>768(태블릿)</option>
      <option value="1024"${fw===1024?' selected':''}>1024</option>
      <option value="1280"${fw===1280?' selected':''}>1280</option>
      <option value="1334"${fw===1334?' selected':''}>1334(학습기)</option>
      <option value="__custom"${[360,390,768,1024,1280,1334].includes(fw)?'':' selected'}>직접(${fw})</option>
    </select></span>
    <span class="rv-fw-ctl">높이 <input type="number" class="rv-fh-inp" id="rvFhInp" value="${fh}" min="200" step="100" title="페이지 전체가 다 보이도록 넉넉히. 아래가 잘리면 값을 키우세요"></span>
    <button class="rv-share-btn" id="rvShareBtn">${shared ? '🔄 동기화' : '📦 올리기'}</button>
    <span class="rv-bar-right">
      ${shared ? '<button class="rv-copyurl-btn" id="rvCopyUrlBtn" title="공유 URL 복사">🔗 URL 복사</button>' : ''}
      <a href="${sc.url}" target="_blank" class="rv-openraw">↗ 원본 열기</a>
    </span>`;
  document.getElementById('rvShareBtn').addEventListener('click', rvGitShare);
  const cp = document.getElementById('rvCopyUrlBtn');
  if (cp) cp.addEventListener('click', rvCopyShareUrl);
  document.getElementById('rvFwSel').addEventListener('change', (e) => {
    let v = e.target.value;
    if (v === '__custom') { v = prompt('화면 폭(px)을 입력하세요', fw); if (!v) { rvRenderStageBar(sc); return; } }
    rvSetScreenWidth(sc.id, v);
  });
  document.getElementById('rvFhInp').addEventListener('change', (e) => {
    rvSetScreenHeight(sc.id, e.target.value);
  });
}

// ── 화면 노출 (iframe + 핀 오버레이) ──
function rvShowScreen(sid) {
  _rvScreenId = sid;
  document.querySelectorAll('.rv-screen').forEach(e => e.classList.toggle('active', e.dataset.sid === sid));
  const sc = rvFindScreen(sid);
  if (!sc) return;
  rvRenderStageBar(sc);
  const wrap = document.getElementById('rvFrameWrap');
  const fw = rvScreenWidth(sid);
  const fh = rvScreenHeight(sid);
  wrap.innerHTML = `<div class="rv-frame" style="width:${fw}px;height:${fh}px"><iframe class="rv-iframe" src="${sc.url}"></iframe><div class="rv-overlay" id="rvOverlay"></div></div>`;
  if (!RV_RO) {
    document.getElementById('rvOverlay').addEventListener('click', (e) => {
      // 기존 핀·열린 입력팝업 클릭은 새 코멘트로 처리하지 않음
      if (e.target.closest('.rv-pin') || e.target.closest('.rv-pin-input')) return;
      const ov = e.currentTarget, r = ov.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      if (_rvAddPinTo) { rvAppendPin(sid, _rvAddPinTo, x, y); return; }  // 위치 추가 모드
      rvAddComment(sid, x, y);
    });
  }
  rvRenderPinsAndComments(sid);
}

// 공유 페이지 생성 → publ-review repo 푸시 → GitHub Pages URL
async function rvGitShare() {
  if (!_rvSet) return;
  const btn = document.getElementById('rvShareBtn');
  if (btn) { btn.disabled = true; btn.textContent = '📦 업데이트 중…'; }
  try {
    const res = await fetch(`/api/reviews/${_rvSet.id}/git-share`, { method: 'POST' }).then(r => r.json());
    if (res.ok && res.url) {
      _rvSet.shared = true; _rvSet.share_url = res.url;
      const sc = rvFindScreen(_rvScreenId); if (sc) rvRenderStageBar(sc);  // 버튼→동기화 + URL복사 노출
      try { await navigator.clipboard.writeText(res.url); } catch (_) {}
      const go = confirm(`✅ 공유 페이지가 업데이트됐어요!\n\n공유 URL (클립보드에 복사됨):\n${res.url}\n\n[확인] 누르면 새 탭으로 엽니다.`);
      if (go) window.open(res.url, '_blank');
    } else {
      const last = (res.logs || []).slice(-1)[0] || {};
      alert('깃 푸시 실패\n' + (last.err || last.out || '로그 확인'));
      if (res.preview_url) window.open(res.preview_url, '_blank');
    }
  } catch (e) {
    alert('공유 오류: ' + e.message);
  } finally {
    const sc = rvFindScreen(_rvScreenId); if (sc) rvRenderStageBar(sc);  // 버튼 상태/활성 복원
  }
}

let _rvAddPinTo = null;   // '위치 추가' 모드 — 이 코멘트 id에 핀만 추가

// 기존 코멘트에 마크업 핀(위치)만 추가 (텍스트 없이)
async function rvAppendPin(sid, cid, x, y) {
  const updated = await fetch(`/api/reviews/${_rvSet.id}/comments/${cid}/pins`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ x, y }),
  }).then(r => r.json());
  const arr = rvScreenComments(sid);
  const idx = arr.findIndex(c => c.id === cid);
  if (idx >= 0) arr[idx] = updated;
  _rvAddPinTo = null;
  document.getElementById('rvOverlay')?.classList.remove('rv-adding-pin');
  rvRenderPinsAndComments(sid);
}

// 클릭 위치에 번호 핀 + 입력 팝업을 띄워 코멘트 작성
function rvAddComment(sid, x, y) {
  const ov = document.getElementById('rvOverlay');
  if (!ov) return;
  ov.querySelector('.rv-pin-input')?.remove();   // 기존 입력 닫기
  const nextNum = rvScreenComments(sid).length + 1;

  const pop = document.createElement('div');
  pop.className = 'rv-pin-input';
  pop.style.left = x + '%';
  pop.style.top = y + '%';
  pop.innerHTML = `
    <span class="rv-pin rv-pin-new">${nextNum}</span>
    <div class="rv-pin-box">
      <textarea class="rv-pin-ta" placeholder="코멘트 입력 · 이미지는 Cmd+V로 붙여넣기 (Enter 저장 · Esc 취소)"></textarea>
      <div class="rv-img-strip"></div>
      <div class="rv-pin-btns">
        <button class="rv-pin-cancel">취소</button>
        <button class="rv-pin-save">저장</button>
      </div>
    </div>`;
  ov.appendChild(pop);
  if (x > 60) pop.classList.add('left');
  if (y > 70) pop.classList.add('up');

  const ta = pop.querySelector('.rv-pin-ta');
  const strip = pop.querySelector('.rv-img-strip');
  const imgs = [];
  const renderStrip = () => {
    strip.innerHTML = imgs.map((d, i) => `<span class="rv-img-thumb"><img src="${d}"><button class="rv-img-x" data-i="${i}">✕</button></span>`).join('');
    strip.querySelectorAll('.rv-img-x').forEach(b => b.addEventListener('click', () => { imgs.splice(+b.dataset.i, 1); renderStrip(); }));
  };
  ta.addEventListener('paste', (e) => rvHandlePasteImages(e, (d) => { imgs.push(d); renderStrip(); }));
  setTimeout(() => ta.focus(), 30);
  const close = () => pop.remove();
  const save = async () => {
    const text = ta.value.trim();
    if (!text && !imgs.length) { close(); return; }
    const c = await fetch(`/api/reviews/${_rvSet.id}/comments`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ screen_id: sid, x, y, text, images: imgs, author: '라라', source: 'manual' }),
    }).then(r => r.json());
    _rvSet.comments[sid] = _rvSet.comments[sid] || [];
    _rvSet.comments[sid].push(c);
    close();
    rvRenderPinsAndComments(sid);
  };
  pop.querySelector('.rv-pin-cancel').addEventListener('click', close);
  pop.querySelector('.rv-pin-save').addEventListener('click', save);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); }
    else if (e.key === 'Escape') close();
  });
}

function rvRenderPinsAndComments(sid) {
  const ov = document.getElementById('rvOverlay');
  const list = rvScreenComments(sid);
  const pinsOf = (c) => (c.pins && c.pins.length) ? c.pins : [{ x: c.x, y: c.y }];
  if (ov) {
    ov.querySelectorAll('.rv-pin').forEach(p => p.remove());
    list.forEach((c, i) => {
      const label = (c.num != null ? c.num : i + 1);
      pinsOf(c).forEach((p, pi) => {
        const pin = document.createElement('div');
        pin.className = `rv-pin ${c.source === 'ai' ? 'ai' : ''} ${c.status === 'resolved' ? 'done' : ''}`;
        pin.style.left = p.x + '%'; pin.style.top = p.y + '%';
        pin.textContent = label;
        ov.appendChild(pin);
        if (!RV_RO) rvMakePinDraggable(pin, ov, c, pi);
      });
    });
  }
  const cm = document.getElementById('rvComments');
  const ctrls = (c) => RV_RO ? '' :
    `<button class="rv-cmt-addpin" data-cid="${c.id}" title="이 코멘트에 마크업 위치 추가">📍+</button>
     <button class="rv-cmt-edit" data-cid="${c.id}" title="수정">✏️</button>
     <button class="rv-cmt-resolve" data-cid="${c.id}" title="해결/되돌리기">${c.status === 'resolved' ? '↩' : '✓'}</button>
     <button class="rv-cmt-del" data-cid="${c.id}" title="삭제">✕</button>`;
  const emptyMsg = RV_RO ? '코멘트 없음' : '화면을 클릭해 코멘트를 남기세요';
  cm.innerHTML = list.length ? list.map((c, i) => {
    const cnt = pinsOf(c).length;
    return `
    <div class="rv-cmt ${c.status}" data-cid="${c.id}">
      <div class="rv-cmt-head"><span class="rv-cmt-no">${c.num != null ? c.num : i + 1}</span>
        <span class="rv-cmt-author">${cnt > 1 ? `<span class="rv-cmt-pincnt">📍${cnt}</span>` : ''}</span>
        ${ctrls(c)}</div>
      <div class="rv-cmt-text">${rvEsc(c.text)}</div>
      ${(c.images && c.images.length) ? `<div class="rv-cmt-imgs">${c.images.map(d => `<img src="${d}" class="rv-cmt-img">`).join('')}</div>` : ''}
    </div>`;
  }).join('') : `<div class="rv-empty">${emptyMsg}</div>`;
  // 이미지 클릭 확대 (보기 모드에서도)
  cm.querySelectorAll('.rv-cmt-img').forEach(img => img.addEventListener('click', () => rvLightbox(img.src)));
  if (!RV_RO) {
    cm.querySelectorAll('.rv-cmt-del').forEach(b => b.addEventListener('click', () => rvDeleteComment(sid, b.dataset.cid)));
    cm.querySelectorAll('.rv-cmt-resolve').forEach(b => b.addEventListener('click', () => rvToggleResolve(sid, b.dataset.cid)));
    cm.querySelectorAll('.rv-cmt-addpin').forEach(b => b.addEventListener('click', () => rvStartAddPin(sid, b.dataset.cid)));
    cm.querySelectorAll('.rv-cmt-edit').forEach(b => b.addEventListener('click', () => rvEditComment(sid, b.dataset.cid)));
  }
  rvUpdateTreeCounts();
}

// '위치 추가' 모드 진입 — 다음 화면 클릭이 이 코멘트에 핀만 추가
function rvStartAddPin(sid, cid) {
  _rvAddPinTo = cid;
  const ov = document.getElementById('rvOverlay');
  if (ov) ov.classList.add('rv-adding-pin');
  const c = rvScreenComments(sid).find(x => x.id === cid);
  showToastRV(`${c && c.num != null ? c.num + '번' : ''} 위치 추가 — 화면에서 원하는 곳을 클릭하세요 (Esc 취소)`);
}

// 간단 토스트 (review 전용)
function showToastRV(msg) {
  let t = document.getElementById('rvToast');
  if (!t) { t = document.createElement('div'); t.id = 'rvToast'; t.className = 'rv-toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 3000);
}
// Esc로 위치추가 모드 취소
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && _rvAddPinTo) {
    _rvAddPinTo = null;
    document.getElementById('rvOverlay')?.classList.remove('rv-adding-pin');
  }
});

// 코멘트 텍스트 인라인 수정
function rvEditComment(sid, cid) {
  const c = rvScreenComments(sid).find(x => x.id === cid);
  if (!c) return;
  const wrap = document.querySelector(`.rv-cmt[data-cid="${cid}"]`);
  const textEl = wrap && wrap.querySelector('.rv-cmt-text');
  if (!textEl) return;
  const imgs = (c.images || []).slice();
  textEl.innerHTML = `
    <textarea class="rv-edit-ta">${rvEsc(c.text)}</textarea>
    <div class="rv-img-strip"></div>
    <div class="rv-edit-btns"><button class="rv-edit-cancel">취소</button><button class="rv-edit-save">저장</button></div>`;
  const ta = textEl.querySelector('.rv-edit-ta');
  const strip = textEl.querySelector('.rv-img-strip');
  const renderStrip = () => {
    strip.innerHTML = imgs.map((d, i) => `<span class="rv-img-thumb"><img src="${d}"><button class="rv-img-x" data-i="${i}">✕</button></span>`).join('');
    strip.querySelectorAll('.rv-img-x').forEach(b => b.addEventListener('click', () => { imgs.splice(+b.dataset.i, 1); renderStrip(); }));
  };
  renderStrip();
  ta.addEventListener('paste', (e) => rvHandlePasteImages(e, (d) => { imgs.push(d); renderStrip(); }));
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
  const done = () => rvRenderPinsAndComments(sid);
  const save = async () => {
    const text = ta.value.trim();
    if (!text && !imgs.length) { done(); return; }
    await fetch(`/api/reviews/${_rvSet.id}/comments/${cid}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, images: imgs }),
    }).catch(() => {});
    c.text = text; c.images = imgs;
    done();
  };
  textEl.querySelector('.rv-edit-cancel').addEventListener('click', done);
  textEl.querySelector('.rv-edit-save').addEventListener('click', save);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); save(); }
    else if (e.key === 'Escape') done();
  });
}

async function rvDeleteComment(sid, cid) {
  await fetch(`/api/reviews/${_rvSet.id}/comments/${cid}`, { method: 'DELETE' });
  _rvSet.comments[sid] = rvScreenComments(sid).filter(c => c.id !== cid);
  rvRenderPinsAndComments(sid);
}

async function rvToggleResolve(sid, cid) {
  const c = rvScreenComments(sid).find(x => x.id === cid);
  const ns = c.status === 'resolved' ? 'open' : 'resolved';
  await fetch(`/api/reviews/${_rvSet.id}/comments/${cid}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: ns }),
  });
  c.status = ns; rvRenderPinsAndComments(sid);
}

</script><script>initReviewView();</script></body></html>
