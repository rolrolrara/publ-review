<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>캐츠 활용기 게시판 — 퍼블 검수 공유</title><style>/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --bg2:       #151820;
  --bg3:       #1c1f2a;
  --border:    #252a38;
  --accent:    #6c63ff;
  --accent2:   #9d8fff;
  --text:      #e1e4ef;
  --text2:     #8891aa;
  --text3:     #555d75;
  --user-bg:   #1e2236;
  --tool-bg:   #111420;
  --success:   #3ecf8e;
  --warn:      #f5a623;
  --error:     #f06060;
  --radius:    12px;
  --sidebar-w: 260px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; }

/* ── Layout ── */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* ── Nav Rail ── */
.nav-rail {
  width: 64px;
  min-width: 64px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 2px;
  overflow: hidden;
}

.nav-rail-logo {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
  font-size: 20px;
}

.nav-item {
  width: 48px;
  height: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  border-radius: 10px;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.nav-item:hover { background: var(--bg3); color: var(--text2); }
.nav-item.active { background: var(--bg3); color: var(--accent2); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 24px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}
.nav-item svg { width: 18px; height: 18px; }
.nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.02em; line-height: 1; }

/* ── Context Panel ── */
.nav-panel {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.nav-panel.hidden { display: none; }

.nav-panel-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-panel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

/* Legacy sidebar-top kept for logo-gem usage */
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}
.logo-gem { color: var(--accent); font-size: 18px; }

.btn-new {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-new:hover { background: var(--accent2); }

.label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--text3);
  text-transform: uppercase;
}

/* ── Dir Tree Section ── */
.tree-section {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  min-height: 0;
  flex: 0 0 auto;
  max-height: 45%;
}

.section-header {
  padding: 10px 14px 6px;
  flex-shrink: 0;
}

.selected-dir {
  display: block;
  font-size: 11px;
  color: var(--accent2);
  font-family: monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 2px;
}

.dir-tree {
  overflow-y: auto;
  flex: 1;
  padding: 4px 0 8px;
}

/* Tree nodes */
.tree-node { user-select: none; }

.tree-row {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 3px 6px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text2);
  font-size: 12px;
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
}
.tree-row:hover { background: var(--bg3); color: var(--text); }
.tree-row.selected {
  background: var(--user-bg);
  color: var(--accent2);
  border-left: 2px solid var(--accent);
}

.tree-toggle {
  flex-shrink: 0;
  width: 14px;
  text-align: center;
  font-size: 9px;
  color: var(--text3);
  transition: transform 0.15s;
  line-height: 1;
}
.tree-toggle.open { transform: rotate(90deg); }
.tree-toggle.leaf { visibility: hidden; }

.tree-icon { flex-shrink: 0; font-size: 13px; }

.tree-name {
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.tree-children {
  display: none;
  /* indent은 tree-row의 padding-left로 처리 */
}
.tree-children.open { display: block; }

.tree-file { cursor: default; }
.tree-file:hover { background: var(--bg3); color: var(--text2); }

.tree-loading {
  font-size: 11px;
  color: var(--text3);
  padding: 3px 8px;
  font-style: italic;
}


/* ── Sessions ── */
.sessions-section {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
}

.session-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

.session-date-header {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text3);
  text-transform: uppercase;
  padding: 8px 10px 3px;
  list-style: none;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  transition: background 0.1s;
}
.session-item:hover { background: var(--bg3); color: var(--text); }
.session-item.active { background: var(--bg3); color: var(--text); border-left: 2px solid var(--accent); }

.session-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-item-del {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: opacity 0.15s, background 0.15s;
}
.session-item:hover .session-item-del { opacity: 1; }
.session-item-del:hover { background: var(--error); color: #fff; }

/* ── Main Chat ── */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.chat-header {
  display: flex;
  align-items: stretch;
  padding: 0 16px 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  min-height: 48px;
  gap: 0;
}

.header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-right: 12px; }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-left: 12px; }

.chat-title { font-weight: 600; font-size: 15px; }
.session-badge {
  font-size: 10px;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: monospace;
}
.model-label { font-size: 11px; color: var(--text3); }

.status-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.3s;
}
.status-indicator.idle { background: var(--text3); }
.status-indicator.running { background: var(--success); animation: pulse 1s infinite; }
.status-indicator.error { background: var(--error); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.status-text { font-size: 12px; color: var(--text2); }

.btn-abort {
  background: var(--error);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
}
.btn-abort:hover { opacity: 0.85; }
.hidden { display: none !important; }

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}

.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 100%;
  color: var(--text2);
  text-align: center;
  padding: 20px;
}
.welcome-gem { font-size: 48px; color: var(--accent); }
.welcome h2 { font-size: 22px; color: var(--text); }
.welcome p { font-size: 14px; }

/* ── Welcome Sessions ── */
.welcome-sessions {
  width: 100%;
  max-width: 560px;
  margin-top: 28px;
}
.welcome-sessions-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
  text-align: left;
}
.welcome-session-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s;
}
.welcome-session-item:hover { background: var(--bg3); border-color: var(--border); }
.welcome-session-item.active { background: var(--bg3); border-color: var(--accent); }
.wsi-icon { width: 14px; height: 14px; flex-shrink: 0; color: var(--text3); }
.wsi-title {
  flex: 1;
  font-size: 13px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: left;
}
.welcome-session-item.active .wsi-title { color: var(--text); }
.wsi-date { font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* ── Quick Action Cards (welcome) ── */
.quick-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  margin-bottom: 8px;
}

.qa-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  width: 180px;
  padding: 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
.qa-card:hover {
  border-color: var(--accent);
  background: var(--user-bg);
  transform: translateY(-2px);
}

.qa-icon { font-size: 22px; }
.qa-title { font-size: 13px; font-weight: 700; color: var(--text); }
.qa-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }

/* ── Quick Bar (above input) ── */
.quick-bar {
  display: flex;
  gap: 8px;
  max-width: 860px;
  margin: 0 auto 8px;
}

.qb-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
}
.qb-btn:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: var(--user-bg);
}


/* Message bubbles */
.msg {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px;
  margin-bottom: 20px;
}

.msg-user .bubble {
  background: var(--user-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-user .meta {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 6px;
  font-weight: 600;
  text-align: right;
}

.msg-assistant .meta {
  font-size: 11px;
  color: var(--accent2);
  margin-bottom: 6px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg-assistant .meta::before {
  content: "◆";
  font-size: 10px;
  color: var(--accent);
}

/* Markdown content */
.md-content { color: var(--text); line-height: 1.7; }
.md-content p { margin-bottom: 10px; }
.md-content p:last-child { margin-bottom: 0; }
.md-content h1, .md-content h2, .md-content h3 {
  color: var(--text);
  margin: 16px 0 8px;
  font-weight: 600;
}
.md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 10px; }
.md-content li { margin-bottom: 4px; }
.md-content code {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  color: var(--accent2);
}
.md-content pre {
  background: #0a0c12;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 10px 0;
}
.md-content pre code {
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  font-size: 13px;
}
.md-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text2);
  margin: 10px 0;
}
.md-content table { border-collapse: collapse; width: 100%; margin: 10px 0; }
.md-content th, .md-content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.md-content th { background: var(--bg3); font-weight: 600; }

/* Tool use blocks */
.tool-block {
  background: var(--tool-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 8px 0;
  overflow: hidden;
}
.tool-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.tool-header:hover { background: var(--bg3); }
.tool-icon { font-size: 13px; }
.tool-name { font-size: 12px; font-weight: 600; color: var(--warn); font-family: monospace; }
.tool-summary { font-size: 12px; color: var(--text3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-toggle { font-size: 11px; color: var(--text3); margin-left: auto; }

.tool-body {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  color: var(--text2);
  white-space: pre-wrap;
  overflow-x: auto;
  display: none;
}
.tool-body.open { display: block; }

.tool-result-block {
  margin: 4px 0;
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text2);
  font-family: monospace;
  white-space: pre-wrap;
  overflow-x: auto;
  max-height: 200px;
  overflow-y: auto;
}

/* Thinking block */
.thinking-block {
  background: var(--bg3);
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text3);
  margin: 6px 0;
  font-style: italic;
}

/* Cursor animation */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  margin-left: 1px;
  vertical-align: text-bottom;
  animation: blink 0.8s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* Cost badge */
.cost-badge {
  display: inline-block;
  font-size: 10px;
  color: var(--text3);
  background: var(--bg3);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 8px;
}

/* ── Input footer ── */
.input-footer {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}

.input-box {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  transition: border-color 0.15s;
  max-width: 860px;
  margin: 0 auto;
}
.input-box:focus-within { border-color: var(--accent); }

textarea {
  background: none;
  border: none;
  outline: none;
  resize: none;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  font-family: inherit;
  overflow-y: auto;
}
textarea::placeholder { color: var(--text3); }

.input-box textarea {
  flex: 1;
  max-height: 200px;
}

.btn-send {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 7px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  color: #fff;
  transition: background 0.15s;
  flex-shrink: 0;
}
.btn-send:hover { background: var(--accent2); }
.btn-send:disabled { background: var(--text3); cursor: not-allowed; }
.btn-send svg { width: 16px; height: 16px; }


/* ── View Title (헤더 좌측 뷰 이름) ── */
.view-title {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

.btn-jira-setup {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
}
.btn-jira-setup:hover { color: var(--text); background: var(--bg3); }
.btn-jira-setup.connected { color: var(--success); border-color: var(--success); }

/* ── Schedule View ── */
.schedule-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px 24px;
}

.schedule-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 16px;
}

.schedule-body {
  flex: 1;
  display: flex;
  gap: 0;
  overflow: hidden;
  min-height: 0;
}

#scheduleContent {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
  transition: flex 0.25s ease;
}
.schedule-body.has-panel #scheduleContent {
  flex: 0 0 40%;
  max-width: 40%;
}

/* ── Schedule Detail Panel ── */
.schedule-detail-panel {
  flex: 0 0 60%;
  max-width: 60%;
  border-left: 1px solid var(--border);
  padding-left: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
  min-width: 0;
}
.schedule-detail-panel.hidden { display: none; }

/* 패널 내부 2단 레이아웃 */
.sdp-columns {
  display: flex;
  gap: 20px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  margin-top: 16px;
}
.sdp-left {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
  padding-right: 12px;
  border-right: 1px solid var(--border);
}
.sdp-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  min-width: 0;
}

.sdp-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.sdp-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.sdp-title { font-size: 14px; font-weight: 600; color: var(--text1); line-height: 1.4; }
.sdp-close {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}
.sdp-close:hover { background: var(--bg3); color: var(--text1); }

.sdp-section { display: flex; flex-direction: column; gap: 8px; }
.sdp-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 2px;
}
.sdp-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sdp-label { font-size: 11px; color: var(--text3); }
.sdp-value { font-size: 13px; color: var(--text1); }
.sdp-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.sdp-badge.on  { background: rgba(80,200,120,.15); color: var(--success); }
.sdp-badge.off { background: rgba(200,80,80,.12);  color: var(--error); }

.sdp-prompt {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
}
.sdp-prompt.sdp-prompt-visible {
  flex: 1;
  max-height: none;
  overflow-y: auto;
}

/* 실행 이력 */
.sdp-runs-list { display: flex; flex-direction: column; }
.sdp-run-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.sdp-run-row:last-child { border-bottom: none; }
.sdp-run-time { color: var(--text2); }
.sdp-run-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.sdp-run-dot.success { background: #6366f1; }
.sdp-run-skipped {
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.sdp-run-skipped::before { content: '⏭'; font-size: 10px; }
.sdp-run-error {
  font-size: 11px;
  color: var(--error);
  display: flex;
  align-items: center;
  gap: 4px;
}
.sdp-run-error::before { content: '⚠'; font-size: 10px; }
.sdp-skeleton {
  color: var(--text3) !important;
  font-style: italic;
}
.sdp-runs-empty, .sdp-runs-unavailable {
  font-size: 12px;
  color: var(--text3);
  padding: 8px 0;
  line-height: 1.6;
}

.sdp-actions {
  display: flex;
  gap: 8px;
  padding-top: 4px;
}
.sdp-btn-run {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 0;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.sdp-btn-run:hover { opacity: 0.85; }
.sdp-btn-run:disabled { opacity: 0.45; cursor: not-allowed; }

.sdp-loading {
  color: var(--text3);
  font-size: 13px;
  text-align: center;
  padding: 40px 0;
}

.schedule-card.selected {
  border-color: var(--accent);
  background: var(--bg2);
}
.schedule-card { cursor: pointer; }

.schedule-section { margin-bottom: 24px; }

.schedule-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.schedule-empty {
  color: var(--text3);
  font-size: 13px;
  padding: 12px 0;
  font-style: italic;
}

.schedule-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.schedule-card:hover { border-color: var(--accent); }

.schedule-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }

.schedule-info { flex: 1; overflow: hidden; }
.schedule-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.schedule-desc {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.schedule-meta {
  font-size: 11px;
  color: var(--text3);
  font-family: monospace;
}

.schedule-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-schedule-run {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  cursor: pointer;
}
.btn-schedule-run:hover { opacity: 0.85; }
.btn-schedule-del {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
}
.btn-schedule-del:hover { border-color: var(--error); color: var(--error); }

.btn-schedule-reg {
  background: none;
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  color: var(--accent2);
  cursor: pointer;
}
.btn-schedule-reg:hover { background: var(--user-bg); }

.badge-registered {
  display: inline-block;
  background: rgba(62,207,142,0.15);
  color: var(--success);
  border-radius: 4px;
  padding: 0 5px;
  font-size: 10px;
  font-weight: 600;
}
.badge-unregistered {
  display: inline-block;
  background: var(--bg3);
  color: var(--text3);
  border-radius: 4px;
  padding: 0 5px;
  font-size: 10px;
}

.sprint-auto-card { border-left: 3px solid var(--accent); }

/* ── 스케줄 인라인 편집 ── */
.btn-schedule-edit {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  line-height: 1;
}
.btn-schedule-edit:hover { border-color: var(--accent2); color: var(--accent2); }

.schedule-edit-panel {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.schedule-edit-panel.open { display: block; }

.schedule-edit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.schedule-edit-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  white-space: nowrap;
}

.schedule-select, .schedule-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
}
.schedule-select:focus, .schedule-input:focus { border-color: var(--accent); }
.schedule-input { width: 60px; text-align: center; }

.schedule-preview {
  font-size: 11px;
  color: var(--accent2);
  font-family: monospace;
  margin-top: 8px;
}

.schedule-edit-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.btn-save-schedule {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.btn-save-schedule:hover { opacity: 0.85; }
.btn-cancel-schedule {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
}
.btn-cancel-schedule:hover { background: var(--bg3); }

/* ── CATS Board ── */
.board-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.board-main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

.board-list {
  flex: 1;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: flex 0.2s ease;
}

.board-main.has-detail .board-list {
  flex: 0 0 40%;
  min-width: 0;
}

.board-main.has-detail .board-detail {
  flex: 0 0 60%;
  min-width: 0;
}

.board-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  flex-shrink: 0;
  gap: 10px;
  min-height: 44px;
}
.blh-left {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.blh-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ── 작업 필터 바 ── */
#boardFilterSlot {
  display: flex;
  align-items: center;
  gap: 6px;
}
.work-filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.work-filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.work-filter-btn:hover {
  background: var(--bg3);
  color: var(--text1);
}
.work-filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.work-filter-count {
  font-size: 11px;
  opacity: 0.8;
  min-width: 4px;
}
.work-filter-btn.active .work-filter-count { opacity: 0.9; }

/* 상태 필터 — 초록 계열로 구분 */
.work-filter-btn[data-filter="status"] { color: var(--text3); }
.work-filter-btn[data-filter="status"]:hover { color: var(--success); border-color: var(--success); }
.work-filter-btn[data-filter="status"].active {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}

/* 구분선 */
.filter-divider {
  display: inline-block;
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 2px;
  align-self: center;
  flex-shrink: 0;
}

.btn-issue-check-create {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent2);
  background: transparent;
  border: 1px solid var(--accent);
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
.btn-issue-check-create:hover { background: rgba(108, 99, 255, 0.12); }
.btn-issue-check-create svg { width: 13px; height: 13px; }

.modal-input,
.modal-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  padding: 8px 12px;
  box-sizing: border-box;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.modal-input:focus,
.modal-select:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text3); }
.modal-select option { background: var(--bg3); color: var(--text); }

/* 기획 유형 라디오 옵션 (planTaskModal) — 입력 필드와 동일 다크 스타일, 선택 시 강조 */
.kind-opt {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.kind-opt input[type="radio"] { accent-color: var(--accent); cursor: pointer; flex: none; margin: 0; }
.kind-opt:hover { border-color: var(--text3); }
.kind-opt:has(input:checked) { border-color: var(--accent); background: rgba(108, 99, 255, 0.12); }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 8px;
  opacity: 0;
  transition: opacity 0.22s, transform 0.22s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast-success { border-color: var(--success); color: var(--success); }
.toast-error   { border-color: var(--error);   color: var(--error); }

.spin { animation: spin 0.8s linear infinite; display: inline-block; }

.eml-upload-label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 8px 12px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  background: var(--bg3);
  font-size: 12px;
  color: var(--text3);
  transition: border-color 0.2s;
}
.eml-upload-label:hover { border-color: var(--accent); color: var(--text2); }
.eml-upload-label svg { width: 14px; height: 14px; flex-shrink: 0; }

.work-tabs {
  display: flex;
  gap: 2px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.work-tab {
  flex: 1;
  padding: 6px 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.work-tab:hover { background: var(--bg3); color: var(--text1); }
.work-tab.active { background: var(--accent); color: #fff; }
.work-tab-count {
  font-size: 11px;
  font-weight: 700;
  opacity: 0.85;
}

.btn-refresh {
  background: none;
  border: none;
  font-size: 16px;
  color: var(--text3);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.btn-refresh:hover { color: var(--text); background: var(--bg3); }

#boardIssues { flex: 1; overflow-y: auto; padding: 8px; }

.board-group { margin-bottom: 16px; }
.board-group-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 4px 8px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.board-group-count {
  background: var(--bg3);
  border-radius: 8px;
  padding: 1px 6px;
  font-size: 10px;
  color: var(--text3);
  font-weight: 600;
}
.board-group-label.waiting { color: var(--text3); }
.board-group-label.inprogress { color: var(--success); }

/* ── 작업보드 섹션 구분 ── */
.work-section {
  margin-bottom: 6px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.work-section-epic    { border-top: 3px solid #a259ff; }
.work-section-mine    { border-top: 3px solid var(--accent); margin-top: 12px; }
.work-section-request { border-top: 3px solid var(--warn);   margin-top: 12px; }

.work-section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg3);
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}

.work-section-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.work-section-dot.epic    { background: #a259ff; }
.work-section-dot.mine    { background: var(--accent); }
.work-section-dot.request { background: var(--warn); }

.work-section .issue-card {
  border-radius: 0;
  border: none;
  border-bottom: 1px solid var(--border);
}
.work-section .issue-card:last-child { border-bottom: none; }

.issue-card {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  margin-bottom: 4px;
  transition: background 0.1s, border-color 0.1s;
}
.issue-card:hover { background: var(--bg3); border-color: var(--border); }
.issue-card.selected { background: var(--user-bg); border-color: var(--accent); }

.issue-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.issue-key {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  font-family: monospace;
  flex-shrink: 0;
}
.issue-type-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text3);
  flex-shrink: 0;
}
.issue-status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: auto;
}
.issue-status-dot.waiting   { background: var(--text3); }
.issue-status-dot.inprogress { background: var(--success); }
.issue-status-dot.epic      { background: #a259ff; }

.issue-status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
  margin-left: auto;
  white-space: nowrap;
}
.issue-status-badge.waiting     { background: rgba(85,93,117,0.2);   color: var(--text3); }
.issue-status-badge.inprogress  { background: rgba(62,207,142,0.15);  color: var(--success); }
.issue-status-badge.done        { background: rgba(108,99,255,0.15);  color: var(--accent2); }
.issue-status-badge.epic        { background: rgba(162,89,255,0.15);  color: #a259ff; }
.issue-status-badge.developing  { background: rgba(62,207,142,0.15);  color: var(--success); }
.issue-status-badge.deploy-wait { background: rgba(245,166,35,0.15);  color: var(--warn); }
.issue-status-badge.verify      { background: rgba(41,182,246,0.15);  color: #29b6f6; }

.sp-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  background: rgba(245,166,35,0.12);
  flex-shrink: 0;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 1px;
}
.sp-num {
  color: var(--warn);
  font-weight: 700;
}
.sp-label {
  color: var(--warn);
  font-weight: 500;
  opacity: 0.55;
}

.issue-summary {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.issue-meta {
  font-size: 10px;
  color: var(--text3);
  margin-top: 5px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
}
.due-today-badge {
  display: inline-block;
  background: rgba(245,166,35,0.18);
  color: #f5a623;
  border: 1px solid rgba(245,166,35,0.4);
  border-radius: 4px;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  margin-left: 4px;
  vertical-align: middle;
  letter-spacing: 0.3px;
}
.issue-card.due-today-card {
  border-left: 2px solid #f5a623;
}
.due-tomorrow-badge {
  display: inline-block;
  background: rgba(41,182,246,0.12);
  color: #29b6f6;
  border: 1px solid rgba(41,182,246,0.35);
  border-radius: 4px;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  margin-left: 4px;
  vertical-align: middle;
  letter-spacing: 0.3px;
}
.issue-card.due-tomorrow-card {
  border-left: 2px solid #29b6f6;
}

.board-loading {
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  padding: 40px;
}
.board-error {
  color: var(--error);
  font-size: 13px;
  padding: 16px;
  text-align: center;
}

/* ── Board Console ── */
.board-console {
  flex-shrink: 0;
  height: 280px;
  border-top: 2px solid var(--accent);
  background: #0a0c12;
  display: flex;
  flex-direction: column;
  transition: border-color 0.4s;
}
.board-console.hidden  { display: none; }
.board-console.stale   { border-top-color: #f59e0b; }
.board-console.done    { border-top-color: var(--success); }
.board-console.has-error { border-top-color: var(--error); }

.console-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}
.console-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}
.console-spinner {
  display: inline-block;
  color: var(--accent);
  animation: spin 1s linear infinite;
}
.console-spinner.hidden { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.console-elapsed {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
}
.console-elapsed.hidden { display: none; }

.console-stale-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: #f59e0b;
  animation: stale-pulse 1.5s ease-in-out infinite;
}
.console-stale-badge.hidden { display: none; }
.console-stale-badge .lucide { width: 12px; height: 12px; }
@keyframes stale-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.console-title { flex: 1; min-width: 0; overflow: hidden; }
.console-actions { display: flex; gap: 6px; flex-shrink: 0; }

.btn-console-abort {
  background: var(--error);
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 3px 9px;
  font-size: 11px;
  cursor: pointer;
}
.btn-console-chat {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 9px;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
}
.btn-console-chat:hover { color: var(--accent2); border-color: var(--accent2); }
.btn-console-close {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 6px;
  border-radius: 4px;
}
.btn-console-close:hover { background: var(--bg3); color: var(--text); }

.console-current-action {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  background: color-mix(in srgb, var(--accent) 8%, var(--bg2));
  border-bottom: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
  border-left: 3px solid var(--accent);
  flex-shrink: 0;
}
.console-current-action.hidden { display: none; }
.cca-icon { font-size: 13px; flex-shrink: 0; }
.cca-text {
  font-size: 11px;
  color: var(--accent2);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.board-console.stale   .console-current-action { border-left-color: #f59e0b; background: color-mix(in srgb, #f59e0b 8%, var(--bg2)); }
.board-console.stale   .cca-text { color: #f59e0b; }

.console-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text2);
}

.console-input-row {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.console-input-row.hidden { display: none; }

.console-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 13px;
  padding: 7px 12px;
  outline: none;
  font-family: inherit;
}
.console-input:focus { border-color: var(--accent); }
.console-input::placeholder { color: var(--text3); }

.btn-console-send {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-console-send:hover { opacity: 0.85; }

.console-line { margin-bottom: 2px; }
.console-line.tool  { color: var(--warn); }
.console-line.text  { color: var(--text2); white-space: pre-wrap; }
.console-line.done  { color: var(--success); }
.console-line.error { color: var(--error); }
.console-line.info  { color: var(--text3); font-style: italic; }

/* ── Issue Detail ── */
.board-detail {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 44px;
  box-sizing: border-box;
}
.btn-back {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
}
.btn-back:hover { background: var(--bg3); }
.detail-key { font-size: 13px; font-weight: 700; color: var(--accent2); font-family: monospace; text-decoration: none; }
.detail-key:hover { text-decoration: underline; }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

.detail-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.4;
}
.detail-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.detail-dates {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.detail-date-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--bg3);
}
.detail-date-chip svg { width: 12px; height: 12px; stroke: currentColor; }
.detail-date-chip .date-label { font-size: 10px; color: var(--text3); margin-right: 2px; }
.detail-date-chip.date-start { }
.detail-date-chip.date-due   { color: var(--success); border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.06); }
.detail-date-chip.date-due.due-today  { color: #f5a623; border-color: rgba(245,166,35,0.45); background: rgba(245,166,35,0.1); font-weight: 600; }
.detail-date-chip.date-due.past-due   { color: var(--error); border-color: rgba(240,96,96,0.4); background: rgba(240,96,96,0.08); }
.detail-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
}
.detail-badge.status-waiting    { border-color: var(--text3);   color: var(--text3); }
.detail-badge.status-inprogress { border-color: var(--success);  color: var(--success); }
.detail-badge.status-developing { border-color: var(--success);   color: var(--success); }
.detail-badge.status-deploy-wait{ border-color: var(--warn);     color: var(--warn); }
.detail-badge.status-verify     { border-color: #29b6f6;         color: #29b6f6; }

.detail-section { margin-bottom: 20px; }
.detail-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.detail-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  background: var(--bg3);
  border-radius: 8px;
  padding: 14px 16px;
}
.detail-desc a { color: var(--accent2); text-decoration: underline; word-break: break-all; }
.detail-desc a:hover { color: var(--text); }
.detail-desc strong { color: var(--text); }
.detail-desc code { background: var(--bg2); padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: monospace; }
.detail-desc ul, .detail-desc ol { padding-left: 20px; margin: 6px 0; }
.detail-desc li { margin-bottom: 3px; }
.detail-desc p { margin: 0 0 8px; }
.detail-desc h1, .detail-desc h2 { font-size: 14px; font-weight: 700; color: var(--text); margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.detail-desc h3 { font-size: 13px; font-weight: 700; color: var(--text); margin: 14px 0 6px; }
.detail-desc h4, .detail-desc h5 { font-size: 12px; font-weight: 600; color: var(--accent2); margin: 10px 0 4px; }
.detail-desc hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.detail-desc blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text3); margin: 8px 0; }
.detail-desc table { width: 100%; border-collapse: collapse; margin: 10px 0 14px; font-size: 12px; }
.detail-desc th, .detail-desc td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; vertical-align: top; }
.detail-desc th { background: var(--bg2); font-weight: 600; color: var(--text); white-space: nowrap; }
.detail-desc td { color: var(--text2); }
.detail-desc tr:hover td { background: rgba(108,99,255,0.04); }

.linked-issue-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--bg3);
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.linked-issue-rel {
  font-size: 11px;
  color: var(--text3);
  min-width: 80px;
  flex-shrink: 0;
}
.linked-issue-key {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-decoration: none;
  flex-shrink: 0;
}
.linked-issue-key:hover { text-decoration: underline; }
.linked-issue-summary {
  font-size: 12px;
  color: var(--text2);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.detail-badge.status-done { border-color: var(--accent); color: var(--accent); }

.comment-item {
  border-left: 2px solid var(--border);
  padding: 8px 12px;
  margin-bottom: 10px;
}
.comment-meta { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.comment-body { font-size: 12px; color: var(--text2); white-space: pre-wrap; line-height: 1.5; }

/* 기획/작업 Task 버튼 */
.detail-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  gap: 8px;
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.btn-task {
  flex: 0 0 auto;
  width: 130px;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 11.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.01em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn-task:hover { background: var(--bg2); border-color: var(--accent); transform: translateY(-1px); }
.btn-task i, .btn-task svg { width: 13px; height: 13px; flex: 0 0 auto; color: var(--accent2); opacity: 0.9; }

/* ── 통일 중립 팔레트 — 색은 아이콘으로만 구분, 배경은 모두 동일 ── */
.btn-task-plan,
.btn-task-req-update,
.btn-task-update,
.btn-task-status,
.btn-task-work,
.btn-task-epic,
.btn-task-project,
.btn-task-summary,
.btn-task-screenplan,
.btn-task-qa,
.btn-task-qa-update,
.btn-task-qa-epic { background: var(--bg3); color: var(--text); }

/* DBR 댓글 업데이트 모달 */
.dbr-option { display:flex; align-items:center; gap:10px; cursor:pointer; padding:10px 14px; border-radius:8px; border:1px solid var(--border); transition:background 0.15s; }
.dbr-option:hover { background:var(--bg3); }
.dbr-option input[type="radio"] { accent-color:var(--accent); width:16px; height:16px; cursor:pointer; }
.dbr-option span { font-size:13px; color:var(--text); }
.btn-reanalyze { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
.btn-reanalyze:hover { border-color: var(--accent); color: var(--accent2); }
.review-badge { display: inline-block; background: var(--success); color: #111; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: 4px; vertical-align: middle; line-height: 1.4; }
.btn-task-source,
.btn-task-issue-review,
.btn-task-subtask,
.btn-task-qa-run        { background: var(--bg3); color: var(--text); }

/* ── Ops Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 440px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 15px; font-weight: 600; }

.btn-close {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 4px;
}
.btn-close:hover { background: var(--bg3); color: var(--text); }

.modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
}

.btn-cancel {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
}
.btn-cancel:hover { background: var(--bg3); }

.btn-select {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-select:hover { opacity: 0.85; }
.btn-select:disabled { opacity: 0.45; cursor: not-allowed; }

/* QA Opus 토글 */
.qa-opus-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
}
.qa-opus-toggle input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.qa-opus-toggle span { display: flex; align-items: center; gap: 5px; }
.qa-opus-toggle:has(input:checked) { color: var(--accent2); }

/* Ops modal specifics */
.ops-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.ops-tab {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  font-size: 13px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.ops-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
.ops-tab:hover:not(.active) { color: var(--text2); }

.ops-pane { padding: 16px 18px; }
.ops-pane.hidden { display: none; }

.ops-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.ops-issue-row {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.ops-issue-row:focus-within { border-color: var(--accent); }
.ops-prefix {
  padding: 8px 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent2);
  font-family: monospace;
  border-right: 1px solid var(--border);
  background: var(--bg2);
}
.ops-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  padding: 8px 10px;
  font-size: 13px;
  color: var(--text);
  font-family: monospace;
}
.ops-input::placeholder { color: var(--text3); }
.qa-guide-input {
  width: 100%;
  margin-top: 6px;
  background: var(--bg3);
  border: 1px dashed var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 7px 10px;
  resize: none;
  min-height: 52px;
  box-sizing: border-box;
  font-family: inherit;
  line-height: 1.5;
}
.qa-guide-input:focus { outline: none; border-color: var(--accent); border-style: solid; }
.qa-guide-input::placeholder { color: var(--text3); }

.ops-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.5;
}
.ops-textarea:focus { border-color: var(--accent); }
.ops-textarea::placeholder { color: var(--text3); }

/* ── 프로젝트 모달 ── */
.project-modal {
  width: 92vw;
  max-width: 1300px;
  height: 85vh;
  display: flex;
  flex-direction: column;
}
.project-tabs {
  display: flex;
  gap: 4px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}
.project-tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  margin-bottom: -1px;
}
.project-tab:hover { color: var(--text2); }
.project-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.project-tab-body {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.project-pane {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 16px 20px;
  overflow: hidden;
}
.project-pane.hidden { display: none; }
.project-pane.active { display: flex; }

/* 로딩 상태 */
.ptab-loading {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text3);
  font-size: 14px;
}
.ptab-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ptab-spinner-inline {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* 정책서 탭 — 기준 기획안(어노테이션) 표시 박스 */
.policy-proto-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 3px solid #10b981;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 12px;
  flex-wrap: wrap;
}
.policy-proto-label { color: var(--text3); font-weight: 600; flex-shrink: 0; }
.policy-proto-name { color: var(--text2); font-weight: 700; }
.policy-proto-meta { color: var(--text3); font-size: 11px; }
.policy-proto-link {
  margin-left: auto;
  background: rgba(16, 185, 129, 0.1);
  color: #10b981;
  padding: 5px 10px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}
.policy-proto-link:hover { background: rgba(16, 185, 129, 0.2); }
.policy-proto-empty {
  background: rgba(239, 68, 68, 0.08);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 12px;
  color: #f87171;
}

/* 탭 공통 요소 */
.ptab-desc {
  font-size: 13px;
  color: var(--text3);
  margin: 0 0 14px;
  line-height: 1.6;
}
.project-textarea {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  font-size: 13px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.6;
  transition: border-color 0.15s;
}
.project-textarea:focus { border-color: var(--accent); }
.ptab-footer {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  padding-top: 14px;
}
.ptab-result {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.confluence-link {
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.confluence-link:hover { text-decoration: underline; }

/* 에픽 생성 버튼 */
.btn-epic-create {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.btn-epic-create:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-epic-create:disabled { opacity: 0.55; cursor: not-allowed; }

/* 에픽 생성 결과 배너 */
.epic-result {
  padding: 8px 18px;
  background: color-mix(in srgb, var(--accent) 10%, var(--bg2));
  border-bottom: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border));
  font-size: 13px;
}
.epic-result.hidden { display: none; }

/* 요구사항 확인 탭 분할 뷰 */
.review-split {
  flex: 1;
  display: flex;
  gap: 16px;
  overflow: hidden;
}

/* ── 요구사항 확인 문서 팝업 (legacy — review split용 공유) ── */
.review-doc-modal {
  width: 90vw;
  max-width: 1200px;
  height: 80vh;
  display: flex;
  flex-direction: column;
}
.review-doc-body {
  display: flex;
  gap: 16px;
  flex: 1;
  overflow: hidden;
  padding: 0 20px;
}
.review-doc-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.review-doc-pane-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.review-doc-editor {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  font-size: 13px;
  font-family: 'SF Mono', 'Menlo', monospace;
  color: var(--text);
  resize: none;
  outline: none;
  line-height: 1.6;
  transition: border-color 0.15s;
}
.review-doc-editor:focus { border-color: var(--accent); }
.review-doc-preview {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 13px;
  color: var(--text2);
  overflow-y: auto;
  line-height: 1.7;
}
.review-doc-preview h1 { font-size: 18px; color: var(--text); margin: 0 0 14px; }
.review-doc-preview h2 { font-size: 14px; color: var(--text); margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.review-doc-preview h3 { font-size: 13px; color: var(--text); margin: 14px 0 6px; }
.review-doc-preview p  { margin: 0 0 10px; }
.review-doc-preview ul, .review-doc-preview ol { margin: 0 0 10px; padding-left: 20px; }
.review-doc-preview li { margin-bottom: 4px; }
.review-doc-preview table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
.review-doc-preview th, .review-doc-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.review-doc-preview th { background: var(--bg2); font-weight: 600; color: var(--text); }
.review-doc-preview blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text3); margin: 0 0 10px; }
.review-doc-preview code { background: var(--bg2); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; }
.review-doc-preview hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.review-doc-saved-badge {
  font-size: 11px;
  color: var(--success);
  padding: 3px 10px;
  border: 1px solid var(--success);
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
}
.review-doc-saved-badge.show { opacity: 1; }

/* ── 소스 리뷰 모달 ── */
.source-review-modal {
  width: min(820px, 92vw);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
}
.source-review-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  min-height: 200px;
}
.source-review-result {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text);
}
.source-review-result h2 { font-size: 15px; font-weight: 700; margin: 18px 0 8px; color: var(--accent2); }
.source-review-result h3 { font-size: 14px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }
.source-review-result h4 { font-size: 13px; font-weight: 600; margin: 10px 0 4px; color: var(--text2); }
.source-review-result p  { margin: 0 0 10px; }
.source-review-result ul, .source-review-result ol { padding-left: 20px; margin: 0 0 10px; }
.source-review-result li { margin-bottom: 4px; }
.source-review-result code {
  background: var(--bg2);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', monospace;
  font-size: 12px;
  color: var(--accent2);
}
.source-review-result pre {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0 14px;
}
.source-review-result pre code { background: none; padding: 0; color: var(--text); }
.source-review-result table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0 14px;
  font-size: 13px;
}
.source-review-result th, .source-review-result td {
  border: 1px solid var(--border);
  padding: 7px 12px;
  text-align: left;
}
.source-review-result th { background: var(--bg3); color: var(--text); font-weight: 600; }
.source-review-result td { color: var(--text2); }
.source-review-result hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.source-review-result blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text3);
  margin: 0 0 10px;
}
.source-review-result strong { color: var(--text); }

/* ── Skill Template Button ── */
.skill-item { position: relative; }
.btn-skill-tpl {
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text3);
  font-size: 10px;
  padding: 1px 5px;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s, color .15s;
  white-space: nowrap;
}
.skill-item:hover .btn-skill-tpl { opacity: 1; }
.btn-skill-tpl:hover { color: var(--accent2); border-color: var(--accent2); }

/* ── Template Modal ── */
.template-modal {
  width: 860px;
  max-width: 96vw;
  height: 88vh;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
}
.template-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 0;
}
.template-list {
  width: 200px;
  min-width: 160px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 8px 0;
}
.tpl-group {
  padding: 4px 12px 2px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.tpl-file {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: background .1s;
}
.tpl-file:hover { background: var(--bg3); color: var(--text); }
.tpl-file.active { background: var(--user-bg); color: var(--accent2); border-left: 2px solid var(--accent); }
.tpl-file-icon { font-size: 11px; flex-shrink: 0; }

.template-editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.template-editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px 8px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.template-editor-title {
  font-size: 12px;
  color: var(--text2);
}
.template-saved-badge {
  font-size: 11px;
  color: var(--success);
  background: rgba(62,207,142,.12);
  border-radius: 4px;
  padding: 2px 7px;
}
.template-preview-toggle {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.template-tab {
  background: none;
  border: none;
  padding: 3px 10px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  border-radius: 4px;
  transition: background .1s, color .1s;
}
.template-tab:hover { color: var(--text); }
.template-tab.active { background: var(--bg3); color: var(--text); }
.template-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.template-editor {
  flex: 1;
  background: var(--bg);
  border: none;
  resize: none;
  padding: 14px 16px;
  font-family: 'SF Mono', monospace;
  font-size: 13px;
  color: var(--text);
  line-height: 1.7;
  outline: none;
  overflow-y: auto;
  min-height: 0;
}
.template-preview {
  flex: 1;
  padding: 14px 20px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
}

/* ── Source Review Footer (퍼블 링크) ── */
.source-review-footer {
  flex-shrink: 0;
  padding: 12px 20px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
}
.publ-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.publ-label {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  white-space: nowrap;
}
.publ-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.publ-input:focus { border-color: var(--accent); }
.publ-input::placeholder { color: var(--text3); }
.btn-apply-code {
  flex-shrink: 0;
  background: linear-gradient(135deg, #f5a623, #e8960d);
  color: #111;
  border: none;
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .15s, transform .1s;
}
.btn-apply-code:hover { opacity: .9; }
.btn-apply-code:active { transform: scale(.97); }
.btn-apply-code:disabled { opacity: .5; cursor: not-allowed; }

/* ── 에이전트 트리 뷰 ── */
.agent-view {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.agent-view-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px 16px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.agent-view-body {
  flex: 1;
  min-height: 0;
  display: flex;
  overflow: hidden;
}

.agent-left {
  flex: 1;
  min-width: 0;
  min-height: 0;
  overflow-y: auto;
  padding: 12px 0 20px;
  transition: border-right 0s;
}

.agent-view-body.panel-open .agent-left {
  border-right: 1px solid var(--border);
}

.agent-right {
  flex-shrink: 0;
  width: 0;
  min-height: 0;
  overflow: hidden;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transition: width 0.25s ease;
}

.agent-view-body.panel-open .agent-right {
  width: 50%;
}

/* 빈 상태 */
.acp-empty {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  overflow: hidden;
  color: var(--text3);
  font-size: 13px;
  text-align: center;
  line-height: 1.7;
}
.acp-empty .lucide { width: 32px; height: 32px; opacity: 0.35; }

/* 에디터 */
.acp-editor {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.acp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
}

.acp-title {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.acp-dirty {
  color: var(--accent2);
  font-size: 10px;
}

.acp-actions { display: flex; gap: 8px; align-items: center; }

.acp-edit-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.acp-edit-btn:hover { border-color: var(--accent); color: var(--accent2); }
.acp-edit-btn .lucide { width: 12px; height: 12px; }

.acp-save-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.acp-save-btn:hover { opacity: 0.85; }
.acp-save-btn:disabled { opacity: 0.45; cursor: default; }
.acp-save-btn .lucide { width: 13px; height: 13px; }

.acp-cancel-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.acp-cancel-btn:hover { border-color: #e55; color: #e55; }
.acp-cancel-btn .lucide { width: 13px; height: 13px; }

.acp-close-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.acp-close-btn:hover { border-color: var(--accent); color: var(--accent2); }
.acp-close-btn .lucide { width: 14px; height: 14px; }

.acp-body {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
}

#agentContextTextarea {
  flex: 1;
  width: 100%;
  min-height: 0;
  resize: none;
  border: none;
  outline: none;
  box-sizing: border-box;
  color: var(--text);
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px;
  line-height: 1.65;
  padding: 16px 20px;
  overflow-y: auto;
  tab-size: 2;
  transition: background 0.15s;
}
#agentContextTextarea[readonly] {
  background: var(--bg2);
  cursor: default;
}
#agentContextTextarea:not([readonly]) {
  background: var(--bg);
}
#agentContextTextarea:disabled { opacity: 0.5; }

/* 선택된 에이전트 행 */
.at-item.active {
  background: var(--accent);
  color: #fff;
}
.at-item.active .at-item-desc,
.at-item.active .at-item-step { color: rgba(255,255,255,0.75); }
.at-master.active {
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
}
.at-master.active .at-master-desc { color: rgba(255,255,255,0.75); }

.agent-view-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.agent-view-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.agent-updated-at {
  font-size: 11px;
  color: var(--text3);
  font-family: monospace;
}

.agent-total-badge {
  font-size: 11px;
  color: var(--accent2);
  background: rgba(108,99,255,0.12);
  border-radius: 8px;
  padding: 1px 8px;
  font-weight: 600;
}

.btn-agent-update {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, transform 0.2s;
}
.btn-agent-update:hover { border-color: var(--accent); color: var(--accent2); }
.btn-agent-update.spinning { animation: spin 0.8s linear infinite; }

.agent-tree-body {
  padding: 0 0 20px;
}

/* 그룹 */
.at-group {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 6px;
}

.at-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg3);
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}
.at-group-header:hover { background: var(--user-bg); }

.at-group-icon { font-size: 15px; flex-shrink: 0; }
.at-group-label { font-size: 12px; font-weight: 700; color: var(--text); flex: 1; }
.at-group-count {
  font-size: 10px;
  color: var(--text3);
  background: var(--bg);
  border-radius: 8px;
  padding: 1px 7px;
  font-weight: 600;
}
.at-group-toggle {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.15s;
}
.at-group-toggle.open { transform: rotate(90deg); }

.at-group-body { display: none; padding: 6px 0; }
.at-group-body.open { display: block; }

/* 트리 아이템 */
.at-tree {
  padding: 4px 14px 4px 22px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  line-height: 1.8;
}

.at-row {
  display: flex;
  align-items: baseline;
  gap: 0;
}

.at-connector {
  color: var(--text3);
  flex-shrink: 0;
  white-space: pre;
  font-size: 12px;
}

.at-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 6px;
  cursor: default;
  transition: background 0.1s;
  flex: 1;
  min-width: 0;
}
.at-item:hover { background: var(--bg3); }

.at-item-icon { font-size: 13px; flex-shrink: 0; }

.at-item-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent2);
  white-space: nowrap;
}

.at-item-step {
  font-size: 10px;
  color: var(--text3);
  background: var(--bg3);
  border-radius: 4px;
  padding: 1px 5px;
  flex-shrink: 0;
}

.at-item-desc {
  font-size: 11px;
  color: var(--text3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin-left: 4px;
}

/* 마스터 노드 */
.at-master {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 6px;
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.2);
  margin: 6px 14px 2px 22px;
}
.at-master-icon { font-size: 14px; }
.at-master-label { font-size: 12px; font-weight: 700; color: var(--accent2); }
.at-master-badge {
  font-size: 10px;
  color: var(--accent);
  background: rgba(108,99,255,0.15);
  border-radius: 4px;
  padding: 1px 6px;
  font-weight: 600;
}
.at-master-desc { font-size: 11px; color: var(--text3); margin-left: 4px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Lucide 아이콘 ── */
.lucide {
  display: inline-block;
  vertical-align: -0.125em;
  flex-shrink: 0;
  width: 1em;
  height: 1em;
}
.qa-icon .lucide       { width: 22px; height: 22px; }
.btn-skill-tpl .lucide { width: 12px; height: 12px; }
.console-spinner .lucide { width: 14px; height: 14px; }
.at-group-toggle .lucide { width: 9px; height: 9px; }
.skill-cat-toggle .lucide { width: 9px; height: 9px; }

/* ── 메모 패널 (board-detail 우측) ── */
.board-memo {
  flex: 1;
  min-width: 200px;
  max-width: 300px;
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  background: var(--bg);
  overflow: hidden;
}
.board-memo.hidden { display: none; }

.memo-panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg2);
  min-height: 44px;
  box-sizing: border-box;
}
.memo-panel-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  flex: 1;
}
.memo-issue-key-badge {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  font-family: monospace;
}

.memo-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.memo-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  position: relative;
}
.memo-item-date {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent2);

}

/* 왼쪽 목록 패널 */

  width: 220px; flex-shrink: 0; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.pj-list-header {
  display: flex; align-items: center; justify-content: space-between;

.pj-list { flex: 1; overflow-y: auto; padding: 8px 0; }

/* 목록 아이템 */

  padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.pj-list-item:hover { background: var(--bg2); }

  flex: 1; display: flex; flex-direction: column; align-items: center;

}

/* 상세 헤더 */
.pj-detail-header {
  padding: 16px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.pj-detail-key { font-size: 12px; color: var(--accent2); font-weight: 700; margin-bottom: 4px; }

}

/* 바디: 단계 + 패널 */
.pj-body {
  display: flex; flex: 1; min-height: 0; overflow: hidden;
  border-bottom: 1px solid var(--border);
}

/* 단계 목록 */

  width: 200px; flex-shrink: 0; border-right: 1px solid var(--border);
  overflow-y: auto; padding: 8px 0;
}
.pj-step-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; cursor: pointer; transition: background 0.12s;
  border-left: 3px solid transparent;
}
.pj-step-item:hover { background: var(--bg2); }
.pj-step-item.active { background: var(--bg2); border-left-color: var(--accent); }

.pj-step-status.completed{ background: #16a34a; color: #fff; }

.pj-step-status-badge.completed { background: #15803d; color: #fff; }

.pj-step-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.pj-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;

  margin-bottom: 16px; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;

  font-size: 12px; font-weight: 700; color: var(--text2);

  border: 1px solid var(--border); padding: 5px 8px;
